<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Рыбная ферма</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;overflow-x:hidden}
#ocean{width:100%;height:180px;position:relative;overflow:hidden;cursor:pointer;border-bottom:3px solid #1565c0;-webkit-tap-highlight-color:transparent;transition:background 0.6s}
.bubble{position:absolute;border-radius:50%;animation:rise 3s infinite ease-in}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:.6}100%{transform:translateY(-180px) scale(.3);opacity:0}}
.tap-anim{position:absolute;pointer-events:none;font-size:26px;animation:popfish .8s ease-out forwards}
.plus-anim{position:absolute;pointer-events:none;font-size:14px;font-weight:700;color:#FFD700;animation:floatup .9s ease-out forwards}
@keyframes popfish{0%{transform:scale(.5);opacity:1}50%{transform:scale(1.4);opacity:1}100%{transform:scale(1) translateY(-50px);opacity:0}}
@keyframes floatup{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-55px);opacity:0}}
#hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:rgba(255,255,255,.7);text-align:center;pointer-events:none;transition:opacity .5s}
#loc-bar{display:flex;overflow-x:auto;gap:6px;padding:8px 10px;background:#16213e;scrollbar-width:none}
#loc-bar::-webkit-scrollbar{display:none}
.loc-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid #0f3460;background:#0f3460;color:#90caf9;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.loc-btn.active{background:#1565c0;border-color:#1565c0;color:#fff}
.loc-btn.locked{opacity:.4;cursor:not-allowed}
#stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 10px;background:#16213e}
.st{background:#0f3460;border-radius:10px;padding:8px 4px;text-align:center}
.st b{display:block;font-size:15px;font-weight:700;color:#fff}
.st span{font-size:10px;color:#90caf9}
#tabs{display:flex;background:#16213e;border-bottom:1px solid #0f3460}
.tab{flex:1;padding:8px 2px;text-align:center;font-size:11px;cursor:pointer;color:#90caf9;border-bottom:2px solid transparent}
.tab.active{color:#FFD700;border-bottom-color:#FFD700}
#content{padding:10px;padding-bottom:20px}
.card{background:#0f3460;border-radius:12px;padding:12px;margin-bottom:8px}
.upg{display:flex;align-items:center;gap:10px;background:#0f3460;border-radius:12px;padding:10px 12px;margin-bottom:8px}
.upg .ico{font-size:22px}
.upg .inf{flex:1}
.upg .inf .n{font-size:14px;font-weight:600;color:#fff}
.upg .inf .d{font-size:11px;color:#90caf9;margin-top:2px}
.fish-item{display:flex;align-items:center;gap:10px;background:#0f3460;border-radius:12px;padding:10px 12px;margin-bottom:8px}
.fish-item .ico{font-size:22px;width:30px;text-align:center}
.fish-item .inf{flex:1}
.bar-bg{height:5px;background:#1a1a2e;border-radius:3px;margin-top:5px}
.bar-fill{height:5px;border-radius:3px;transition:width .3s}
.locked-item{opacity:.4;filter:grayscale(1)}
.badge{font-size:10px;background:#1565c0;color:#90caf9;padding:2px 7px;border-radius:6px}
.loc-card{background:#0f3460;border-radius:12px;padding:14px;margin-bottom:10px}
.loc-card h4{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px}
.loc-card p{font-size:12px;color:#90caf9;margin-bottom:10px}
.loc-card.current{border:1.5px solid #FFD700}
.mkt-item{display:flex;align-items:center;gap:10px;background:#0f3460;border-radius:12px;padding:10px 12px;margin-bottom:8px}
.mkt-item .ico{font-size:22px;width:30px;text-align:center}
.mkt-item .inf{flex:1}
.mkt-item .inf .pr{font-size:12px;margin-top:3px}
.price-up{color:#4caf50}.price-down{color:#f44336}.price-flat{color:#90caf9}
.btn{background:#1565c0;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn:disabled{background:#333;color:#666;cursor:not-allowed}
.btn-green{background:#27ae60}
.btn-gold{background:#8B6914;color:#FFD700}
.btn-red{background:#c0392b}
.btn-full{width:100%;padding:12px;font-size:13px}
.notif{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0f3460;border:1.5px solid #1565c0;border-radius:12px;padding:10px 16px;font-size:13px;color:#fff;z-index:999;animation:slideup .3s ease-out,fadeout .5s ease-in 2.5s forwards;white-space:nowrap;max-width:90vw;text-align:center}
.notif.dead{border-color:#c0392b}
@keyframes slideup{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes fadeout{to{opacity:0}}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.day-cell{background:#0f3460;border:1px solid #1a2a5a;border-radius:8px;padding:5px 2px;text-align:center}
.day-cell.done{background:#0a2a0a;border-color:#2d6a4f}
.day-cell.current{border:2px solid #FFD700}
</style>
</head>
<body>
<div id="ocean" ontouchstart="tapOcean(event)" onclick="tapOcean(event)">
  <div id="hint">🎣 Тапай чтобы ловить рыбу!</div>
  <div id="loc-label" style="position:absolute;top:10px;left:12px;font-size:12px;font-weight:600;color:rgba(255,255,255,.8);pointer-events:none"></div>
</div>
<div id="bank-banner" onclick="showTab('bank')" style="background:linear-gradient(135deg,#0a2a5a,#1565c0,#0a3d6b);margin:0;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;-webkit-tap-highlight-color:transparent">
  <div style="display:flex;align-items:center;gap:12px">
    <div style="font-size:28px">🏦</div>
    <div>
      <div style="font-size:14px;font-weight:700;color:#fff">Банк FishFarm</div>
      <div style="font-size:11px;color:#90caf9;margin-top:2px">Обменяй монеты на 🐟 TON Fish за ⭐</div>
    </div>
  </div>
  <div style="background:rgba(255,255,255,0.15);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:#fff">Открыть →</div>
</div>
<div id="loc-bar"></div>
<div id="stats">
  <div class="st"><b id="s-coins">0</b><span>🪙 монет</span></div>
  <div class="st"><b id="s-live">0</b><span>🐠 живых</span></div>
  <div class="st"><b id="s-tap">+0.1</b><span>за тап</span></div>
  <div class="st"><b id="s-auto">0</b><span>авто/сек</span></div>
</div>
<div id="tabs">
  <div class="tab active" onclick="showTab('upgrades')">⬆️ Улучш.</div>
  <div class="tab" onclick="showTab('aquarium')">🐠 Рыбы</div>
  <div class="tab" onclick="showTab('market')">🏪 Рынок</div>
  <div class="tab" onclick="showTab('daily')">🎁 Бонус</div>
  <div class="tab" onclick="showTab('locations')">🗺</div>
  <div class="tab" onclick="showTab('settings')">⚙️</div>
</div>
<div id="content"></div>

<script>
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Данные ────────────────────────────────────────────
var LOCATIONS = [
  {id:'pond',    name:'Пруд',    emoji:'🌿',bg:'#1a3a2a',border:'#2d6a4f',bubble:'rgba(80,200,120,.15)',cost:0,       unlocked:true, tapMult:1 },
  {id:'river',   name:'Река',    emoji:'🏞',bg:'#0d2b45',border:'#1a6b8a',bubble:'rgba(80,160,220,.15)',cost:50000,   unlocked:false,tapMult:2 },
  {id:'tropics', name:'Тропики', emoji:'🌴',bg:'#1a2a0a',border:'#4a8a1a',bubble:'rgba(150,220,80,.15)',cost:300000,  unlocked:false,tapMult:5 },
  {id:'deep',    name:'Глубины', emoji:'🌊',bg:'#050a2a',border:'#1a1a8a',bubble:'rgba(50,50,200,.15)', cost:1500000, unlocked:false,tapMult:15},
  {id:'space',   name:'Космос',  emoji:'🚀',bg:'#05050f',border:'#4a1a8a',bubble:'rgba(150,50,220,.15)',cost:10000000,unlocked:false,tapMult:50}
];

var FISH = {
  pond:   [{emoji:'🐟',name:'Карась',     rate:1.0,need:0,     life:2 },
           {emoji:'🐠',name:'Красноперка',rate:0.5,need:10,    life:4 },
           {emoji:'🐟',name:'Лещ',        rate:0.2,need:50,    life:8 },
           {emoji:'🐡',name:'Щука',       rate:0.08,need:200,  life:16}],
  river:  [{emoji:'🐡',name:'Окунь',   rate:1.0, need:0,   life:2 },
           {emoji:'🦦',name:'Выдра',   rate:0.4, need:700, life:5 },
           {emoji:'🐊',name:'Крокодил',rate:0.15,need:2000,life:10},
           {emoji:'🦛',name:'Гиппо',   rate:0.05,need:5000,life:20}],
  tropics:[{emoji:'🐠',name:'Тропик', rate:1.0, need:0,    life:3 },
           {emoji:'🦜',name:'Попугай',rate:0.4, need:4000, life:6 },
           {emoji:'🐍',name:'Змея',   rate:0.15,need:8000, life:12},
           {emoji:'🦋',name:'Бабочка',rate:0.05,need:20000,life:24}],
  deep:   [{emoji:'🦑',name:'Кальмар', rate:1.0, need:0,    life:4 },
           {emoji:'🐙',name:'Осьминог',rate:0.4, need:18000,life:8 },
           {emoji:'🦈',name:'Акула',   rate:0.15,need:30000,life:16},
           {emoji:'🐳',name:'Кит',     rate:0.04,need:80000,life:24}],
  space:  [{emoji:'👾',name:'Пришелец', rate:1.0, need:0,      life:6 },
           {emoji:'🛸',name:'НЛО',      rate:0.3, need:120000, life:12},
           {emoji:'🌌',name:'Галактика',rate:0.1, need:300000, life:20},
           {emoji:'⭐',name:'Звезда',   rate:0.03,need:1000000,life:24}]
};

var ALL_FISH = [];
var k; for (k in FISH) { var i; for (i=0;i<FISH[k].length;i++) ALL_FISH.push(FISH[k][i]); }

var BASE_PRICES = {
  'Карась':0.5,'Красноперка':1.2,'Лещ':2.5,'Щука':6,
  'Окунь':0.8,'Выдра':2,'Крокодил':5,'Гиппо':13,
  'Тропик':1.5,'Попугай':4,'Змея':10,'Бабочка':28,
  'Кальмар':3,'Осьминог':8,'Акула':20,'Кит':60,
  'Пришелец':10,'НЛО':30,'Галактика':80,'Звезда':250
};

var TRANSPORTS = [
  {id:'bike', name:'Велосипед',emoji:'🚲',capacity:5,  cost:0,     time:480,repairCost:50   },
  {id:'moped',name:'Мопед',    emoji:'🛵',capacity:15, cost:5000,  time:180,repairCost:500  },
  {id:'car',  name:'Машина',   emoji:'🚗',capacity:40, cost:50000, time:90, repairCost:5000 },
  {id:'truck',name:'Грузовик', emoji:'🚛',capacity:100,cost:300000,time:120,repairCost:30000}
];

var UPGRADES = [
  {id:'rod',  name:'Удочка',emoji:'🎣',desc:'x2 монеты + шанс улова',  costs:[200,800,3000,10000,30000],     bought:0,max:5},
  {id:'net',  name:'Сеть',  emoji:'🕸',desc:'+2 авто-улова/сек',       costs:[500,2000,8000,30000],           bought:0,max:4},
  {id:'boat', name:'Лодка', emoji:'⛵',desc:'+3 к авто-улову',         costs:[1500,6000,25000],               bought:0,max:3},
  {id:'sonar',name:'Сонар', emoji:'📡',desc:'+0.5 авто/сек за уровень',costs:[5000,25000,100000,300000,1000000],bought:0,max:5}
];

var DAILY = [10,25,50,100,200,400,1000];

// ── Состояние ─────────────────────────────────────────
var state = {
  coins:0,caught:0,tapPower:0.1,autoPerSec:0,
  currentLoc:'pond',unlockedLocs:['pond'],
  unlockedFish:{pond:['Карась']},caughtFish:{},liveFish:[],
  transport:'bike',delivery:null,unlockedTransports:['bike'],
  durability:{bike:100,moped:100,car:100,truck:100},
  dailyDay:0,dailyLastClaim:0,lastSeen:0,selectedFish:null
};

var marketPrices = {};
var lastPriceUpdate = 0;
var PRICE_INTERVAL = 30000;
var currentTab = 'upgrades';
var tapped = false;
var lastAuto = Date.now();
var lastTapTime = 0;
var tapTimes = [];
var scareFactor = 1.0;
var MAX_TPS = 5;

// ── Утилиты ───────────────────────────────────────────
function fmt(c) {
  if (typeof c !== 'number' || isNaN(c)) return '0';
  if (c >= 1000000) return (c/1000000).toFixed(2)+'M';
  if (c >= 1000) return (c/1000).toFixed(1)+'k';
  return c.toFixed(1);
}
function fmtTime(s) {
  var m = Math.floor(s/60); var r = s%60;
  return m>0 ? (m+'мин'+(r>0?' '+r+'с':'')) : s+'с';
}
function getLoc(id) {
  var lid = id||state.currentLoc;
  for (var i=0;i<LOCATIONS.length;i++) if (LOCATIONS[i].id===lid) return LOCATIONS[i];
  return LOCATIONS[0];
}
function getTr(id) {
  var tid = id||state.transport;
  for (var i=0;i<TRANSPORTS.length;i++) if (TRANSPORTS[i].id===tid) return TRANSPORTS[i];
  return TRANSPORTS[0];
}
function getDur(id) { return state.durability[id||state.transport]||100; }
function durColor(d) { return d>=75?'#6ddc6d':d>=50?'#FFD700':d>=25?'#ff9944':'#f44336'; }
function delivTime(tr) {
  var d=getDur(tr.id);
  var m=d>=75?1:d>=50?1.2:d>=25?1.5:2;
  return Math.round(tr.time*m);
}

// ── Цены ─────────────────────────────────────────────
function initPrices() {
  for (var n in BASE_PRICES) {
    if (!marketPrices[n]) marketPrices[n]={cur:BASE_PRICES[n],prev:BASE_PRICES[n],trend:0};
  }
}
function updatePrices() {
  for (var n in BASE_PRICES) {
    var p=marketPrices[n], base=BASE_PRICES[n];
    var chg=(Math.random()-0.48)*0.3;
    var nv=Math.max(base*0.3,Math.min(base*3,p.cur*(1+chg)));
    p.prev=p.cur; p.cur=Math.round(nv*100)/100;
    p.trend=p.cur>p.prev?1:p.cur<p.prev?-1:0;
  }
  lastPriceUpdate=Date.now();
  if (currentTab==='market') renderMarket();
}

// ── Сохранение ────────────────────────────────────────
function save() {
  try {
    var upg={};
    for (var i=0;i<UPGRADES.length;i++) upg[UPGRADES[i].id]=UPGRADES[i].bought;
    localStorage.setItem('ff5',JSON.stringify({
      coins:state.coins,caught:state.caught,
      loc:state.currentLoc,ulocs:state.unlockedLocs,
      ufish:state.unlockedFish,cfish:state.caughtFish,live:state.liveFish,
      transport:state.transport,delivery:state.delivery,
      utrans:state.unlockedTransports,dur:state.durability,
      dailyDay:state.dailyDay,dailyLast:state.dailyLastClaim,
      lastSeen:Date.now(),upg:upg,prices:marketPrices,priceTs:lastPriceUpdate
    }));
  } catch(e){}
}
function load() {
  try {
    var s=JSON.parse(localStorage.getItem('ff5')||'null');
    if (!s) return;
    state.coins=s.coins||0; state.caught=s.caught||0;
    state.currentLoc=s.loc||'pond';
    state.unlockedLocs=s.ulocs||['pond'];
    state.unlockedFish=s.ufish||{pond:['Карась']};
    state.caughtFish=s.cfish||{};
    state.liveFish=s.live||[];
    state.transport=s.transport||'bike';
    state.delivery=s.delivery||null;
    state.unlockedTransports=s.utrans||['bike'];
    state.durability=s.dur||{bike:100,moped:100,car:100,truck:100};
    state.dailyDay=s.dailyDay||0;
    state.dailyLastClaim=s.dailyLast||0;
    state.lastSeen=s.lastSeen||Date.now();
    for (var i=0;i<UPGRADES.length;i++) { if(s.upg&&s.upg[UPGRADES[i].id]) UPGRADES[i].bought=s.upg[UPGRADES[i].id]; }
    for (var j=0;j<LOCATIONS.length;j++) { if(state.unlockedLocs.indexOf(LOCATIONS[j].id)>=0) LOCATIONS[j].unlocked=true; }
    if (s.prices) marketPrices=s.prices;
    if (s.priceTs) lastPriceUpdate=s.priceTs;
  } catch(e){}
}

// ── Офлайн ────────────────────────────────────────────
function processOffline() {
  var now=Date.now(), last=state.lastSeen||now;
  if (now-last<5000) return;
  if (state.delivery && now>=state.delivery.endsAt) {
    state.coins=Math.round((state.coins+state.delivery.earnings)*100)/100;
    showNotif('💰 Доставка прибыла! +🪙'+fmt(state.delivery.earnings));
    state.delivery=null;
  }
  var dead=[];
  var live=[];
  for (var i=0;i<state.liveFish.length;i++) {
    if (state.liveFish[i].dieAt<=now) dead.push(state.liveFish[i]);
    else live.push(state.liveFish[i]);
  }
  if (dead.length) {
    state.liveFish=live;
    showNotif('💀 Пока тебя не было погибло '+dead.length+' рыб!',true);
  }
}

// ── Расчёты ───────────────────────────────────────────
function calcStats() {
  var tm=1,auto=0;
  for (var i=0;i<UPGRADES.length;i++) {
    var u=UPGRADES[i];
    if (u.id==='rod')   tm+=(Math.pow(2,u.bought)-1);
    if (u.id==='net')   auto+=2*u.bought;
    if (u.id==='boat')  auto+=3*u.bought;
    if (u.id==='sonar') auto+=0.5*u.bought;
  }
  var lm=getLoc().tapMult||1;
  state.tapPower=Math.round(0.1*tm*lm*10)/10;
  state.autoPerSec=Math.round(auto*10)/10;
}
function catchChance() {
  var rod=null;
  for (var i=0;i<UPGRADES.length;i++) if(UPGRADES[i].id==='rod') rod=UPGRADES[i];
  var base=Math.min(0.65,0.20+(rod?rod.bought:0)*0.09);
  return Math.round(base*scareFactor*100)/100;
}
function updateScare() {
  var now=Date.now(), ntimes=[];
  for (var i=0;i<tapTimes.length;i++) if(now-tapTimes[i]<1000) ntimes.push(tapTimes[i]);
  tapTimes=ntimes;
  var tps=tapTimes.length;
  if (tps<=3) scareFactor=Math.min(1.0,scareFactor+0.05);
  else if (tps<=MAX_TPS) scareFactor=Math.max(0.5,scareFactor-0.03);
  else scareFactor=Math.max(0.1,scareFactor-0.15);
}
function unlockFish() {
  var loc=state.currentLoc;
  if (!state.unlockedFish[loc]) state.unlockedFish[loc]=[];
  var fish=FISH[loc]||[];
  for (var i=0;i<fish.length;i++) {
    if (state.unlockedFish[loc].indexOf(fish[i].name)<0 && state.coins>=fish[i].need)
      state.unlockedFish[loc].push(fish[i].name);
  }
}
function randFish() {
  var loc=state.currentLoc;
  var all=FISH[loc]||[];
  var pool=[];
  for (var i=0;i<all.length;i++) if((state.unlockedFish[loc]||[]).indexOf(all[i].name)>=0) pool.push(all[i]);
  if (!pool.length) return all[0]||{emoji:'🐟',name:'Рыба',life:1};
  var tot=0; for (var j=0;j<pool.length;j++) tot+=pool[j].rate;
  var r=Math.random()*tot;
  for (var m=0;m<pool.length;m++) { r-=pool[m].rate; if(r<=0) return pool[m]; }
  return pool[0];
}
function calcEarnings(count) {
  var fish=state.liveFish.slice(0,count), total=0;
  for (var i=0;i<fish.length;i++) {
    var mp=marketPrices[fish[i].name]||{cur:BASE_PRICES[fish[i].name]||1};
    total+=mp.cur;
  }
  return Math.round(total*100)/100;
}

// ── Уведомления и анимации ────────────────────────────
function showNotif(msg,dead) {
  var el=document.createElement('div');
  el.className='notif'+(dead?' dead':'');
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); },3000);
}
function spawnAnim(x,y,emoji,label) {
  var ocean=document.getElementById('ocean');
  var el=document.createElement('div');
  el.className='tap-anim'; el.textContent=emoji;
  el.style.left=(x-13)+'px'; el.style.top=(y-13)+'px';
  ocean.appendChild(el);
  var plus=document.createElement('div');
  plus.className='plus-anim'; plus.textContent=label;
  plus.style.left=(x+8)+'px'; plus.style.top=(y-5)+'px';
  ocean.appendChild(plus);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); if(plus.parentNode) plus.parentNode.removeChild(plus); },900);
}
function spawnBubbles() {
  var ocean=document.getElementById('ocean');
  var old=ocean.querySelectorAll('.bubble');
  for (var i=0;i<old.length;i++) old[i].parentNode.removeChild(old[i]);

function renderMarket() {
  var tr=getTr(), dlv=state.delivery;

  var grouped={};
  for (var i=0;i<state.liveFish.length;i++) { var n=state.liveFish[i].name; grouped[n]=(grouped[n]||0)+1; }

    +'<div style="font-size:11px;color:#90caf9;margin-bottom:8px">'+tr.emoji+' '+tr.name+' · '+tr.capacity+' рыб · '+fmtTime(dt)+'</div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<span style="font-size:11px;color:'+durColor(dur)+'">🔧 '+(broken?'Сломан!':dur+'%')+'</span>'
    +'<div style="flex:1;background:#1a1a2e;border-radius:4px;height:6px"><div style="background:'+durColor(dur)+';height:6px;border-radius:4px;width:'+dur+'%"></div></div>'
    +(dur<100?'<button class="btn '+(state.coins>=tr.repairCost?'btn-gold':'')+'" onclick="repairTr(\''+tr.id+'\')" '+(state.coins>=tr.repairCost?'':'disabled')+' style="font-size:10px;padding:4px 8px">🔧 🪙'+fmt(tr.repairCost)+'</button>':'')
    +'</div>'+(broken?'<div style="font-size:11px;color:#f44336;margin-top:6px">⚠️ Сломан — нужен ремонт!</div>':'')+'</div>';

  // Список рыб с выбором вида

        +'</div>'
        +(isSelected?'<span style="color:#FFD700;font-size:18px">✓</span>':'')
        +'</div>';
    }
    html+='</div>';

    // Кнопка отправки
    var busy=!!dlv;
    var sel=state.selectedFish&&grouped[state.selectedFish]?state.selectedFish:null;
    var sendCnt2=sel?Math.min(grouped[sel],tr.capacity):0;
    var earn2=sel?Math.round((marketPrices[sel]?marketPrices[sel].cur:BASE_PRICES[sel]||1)*sendCnt2*100)/100:0;
    html+='<div class="card" style="background:#0a2a0a">';

    } else {
      html+='<div style="font-size:12px;color:#6ddc6d;margin-bottom:8px">📦 '+sel+': '+sendCnt2+' шт · 🪙'+fmt(earn2)+' · ⏱ '+fmtTime(dt)+'</div>';
    }
    html+='<button class="btn btn-full '+((!busy&&!broken&&sel)?'btn-green':'')+'" onclick="sendDelivery()" '+((busy||broken||!sel)?'disabled':'')+'>'

      +'</button></div>';
  }

  document.getElementById('content').innerHTML=html;

function exchangeCoins() {
  var ai=document.getElementById('ex-amount'), wi=document.getElementById('ex-wallet');

    +'<div class="card"><div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:8px">📊 Статистика</div>'
    +'<div style="font-size:12px;color:#90caf9;line-height:2">'
    +'Монет: '+fmt(state.coins)+'<br>Живых рыб: '+state.liveFish.length+'<br>За тап: '+state.tapPower.toFixed(1)+'<br>Авто/сек: '+state.autoPerSec+'<br>Локация: '+li.emoji+' '+li.name+'<br>Настроение: '+mood+'</div></div>'
    +'<div class="card" style="background:#3d0f0f"><div style="font-size:14px;font-weight:600;color:#ff6b6b;margin-bottom:6px">Сброс прогресса</div>'
    +'<div style="font-size:12px;color:#ff9999;margin-bottom:12px">Весь прогресс будет удалён безвозвратно</div>'
    +'<button class="btn btn-red btn-full" onclick="resetGame()">🗑 Сбросить прогресс</button></div>';
}

// ── Действия ──────────────────────────────────────────
function tapOcean(e) {
  e.preventDefault();
  var now=Date.now();
  if (now-lastTapTime<200) return;
  lastTapTime=now; tapTimes.push(now); updateScare();
  var touch=e.touches&&e.touches[0]?e.touches[0]:e;
  var rect=document.getElementById('ocean').getBoundingClientRect();
  var x=(touch.clientX||touch.pageX)-rect.left, y=(touch.clientY||touch.pageY)-rect.top;
  if (!tapped) { document.getElementById('hint').style.opacity='0'; tapped=true; }
  if (scareFactor<0.5) spawnAnim(x,y,'🐟','😨 Напугана!');
  if (Math.random()>catchChance()) { spawnAnim(x,y,'💨','Мимо!'); if(currentTab==='upgrades') renderUpgrades(); return; }
  var f=randFish(), earned=state.tapPower;
  state.coins=Math.round((state.coins+earned)*100)/100;
  state.caught++;
  state.caughtFish[f.name]=(state.caughtFish[f.name]||0)+1;
  state.liveFish.push({name:f.name,emoji:f.emoji,dieAt:Date.now()+f.life*3600000});
  unlockFish();
  spawnAnim(x,y,f.emoji,'+'+earned.toFixed(1));
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}
function buyUpgrade(id) {
  var u=null; for (var i=0;i<UPGRADES.length;i++) if(UPGRADES[i].id===id) u=UPGRADES[i];
  if (!u||u.bought>=u.max) return;
  var cost=u.costs[u.bought]; if (state.coins<cost) return;
  state.coins=Math.round((state.coins-cost)*100)/100; u.bought++;
  calcStats(); unlockFish(); updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}
function selectFish(name) {
  state.selectedFish = state.selectedFish===name ? null : name;
  renderMarket();
}
function sendDelivery() {
  if (state.delivery) return;
  var tr=getTr(), dur=getDur(tr.id);
  if (dur<=0) { showNotif('🔧 Сломан! Почини транспорт.'); return; }
  var sel=state.selectedFish;
  if (!sel) { showNotif('Выбери вид рыбы!'); return; }
  // собираем только выбранный вид
  var toSend=[], rest=[];
  for (var i=0;i<state.liveFish.length;i++) {
    if (state.liveFish[i].name===sel && toSend.length<tr.capacity) toSend.push(state.liveFish[i]);
    else rest.push(state.liveFish[i]);
  }
  if (!toSend.length) { showNotif('Нет рыбы этого вида!'); return; }
  var earn=0;
  for (var j=0;j<toSend.length;j++) {
    var mp=marketPrices[toSend[j].name]||{cur:BASE_PRICES[toSend[j].name]||1};
    earn+=mp.cur;
  }
  earn=Math.round(earn*100)/100;
  var secs=delivTime(tr);
  state.liveFish=rest;
  state.durability[tr.id]=Math.max(0,dur-10);
  state.delivery={count:toSend.length,earnings:earn,startedAt:Date.now(),endsAt:Date.now()+secs*1000};
  state.selectedFish=null;
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}
function repairTr(id) {
  var tr=getTr(id); if (!tr) return;
  if (state.coins<tr.repairCost) { showNotif('Не хватает монет!'); return; }
  state.coins=Math.round((state.coins-tr.repairCost)*100)/100;
  state.durability[id]=100;
  showNotif('🔧 '+tr.emoji+' '+tr.name+' отремонтирован!');
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}
function selectTransport(id) {
  if (state.unlockedTransports.indexOf(id)<0) return;
  state.transport=id; save(); renderMarket();
}
function buyTransport(id) {
  var tr=getTr(id);
  if (!tr||state.coins<tr.cost||state.unlockedTransports.indexOf(id)>=0) return;
  state.coins=Math.round((state.coins-tr.cost)*100)/100;
  state.unlockedTransports.push(id); state.transport=id;
  showNotif('🎉 Куплен '+tr.emoji+' '+tr.name+'!');
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}
function switchLoc(id) {
  var loc=getLoc(id); if (!loc||!loc.unlocked) return;
  state.currentLoc=id;
  var ocean=document.getElementById('ocean');
  ocean.style.background=loc.bg; ocean.style.borderBottomColor=loc.border;
  document.getElementById('loc-label').textContent=loc.emoji+' '+loc.name;
  spawnBubbles(); calcStats(); renderLocBar(); updateUI(); save();
}
function unlockLoc(id) {
  var loc=getLoc(id); if (!loc||loc.unlocked||state.coins<loc.cost) return;
  state.coins=Math.round((state.coins-loc.cost)*100)/100;
  loc.unlocked=true; state.unlockedLocs.push(id);
  if (!state.unlockedFish[id]) state.unlockedFish[id]=[FISH[id]&&FISH[id][0]?FISH[id][0].name:''];
  renderLocBar(); updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}
function getDailyStatus() {
  var now=Date.now(), last=state.dailyLastClaim, day=state.dailyDay;
  if (!last) return {canClaim:true,day:0,missed:false};
  var h=(now-last)/3600000;
  if (h>=48) return {canClaim:true,day:0,missed:true};
  if (h>=24) return {canClaim:true,day:day,missed:false};
  return {canClaim:false,day:day,missed:false,nextIn:Math.ceil(24-h)};
}
function claimDaily() {
  var st=getDailyStatus(); if (!st.canClaim) return;
  if (st.missed) state.dailyDay=0;
  var reward=DAILY[state.dailyDay];
  state.coins=Math.round((state.coins+reward)*100)/100;
  state.dailyLastClaim=Date.now();
  state.dailyDay=state.dailyDay>=6?0:state.dailyDay+1;
  showNotif('🎁 День '+state.dailyDay+' — получено 🪙'+fmt(reward)+'!');
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}
function resetGame() {
  if (!confirm('Сбросить весь прогресс?')) return;
  if (!confirm('Вы уверены? Нельзя отменить!')) return;
  localStorage.removeItem('ff5');
  state={coins:0,caught:0,tapPower:0.1,autoPerSec:0,currentLoc:'pond',unlockedLocs:['pond'],unlockedFish:{pond:['Карась']},caughtFish:{},liveFish:[],transport:'bike',delivery:null,unlockedTransports:['bike'],durability:{bike:100,moped:100,car:100,truck:100},dailyDay:0,dailyLastClaim:0,lastSeen:0,selectedFish:null};
  for (var i=0;i<UPGRADES.length;i++) UPGRADES[i].bought=0;
  for (var j=0;j<LOCATIONS.length;j++) LOCATIONS[j].unlocked=j===0;
  marketPrices={}; initPrices(); lastPriceUpdate=Date.now();
  tapped=false; scareFactor=1.0;
  document.getElementById('hint').style.opacity='1';
  calcStats(); switchLoc('pond'); showTab('upgrades');
}

// ── Тик ──────────────────────────────────────────────
function checkDeaths() {
  var now=Date.now(), dead=[], live=[];
  for (var i=0;i<state.liveFish.length;i++) {
    if (state.liveFish[i].dieAt<=now) dead.push(state.liveFish[i]);
    else live.push(state.liveFish[i]);
  }
  if (dead.length) {
    state.liveFish=live;
    for (var j=0;j<dead.length;j++) showNotif('💀 '+dead[j].emoji+' '+dead[j].name+' погибла!',true);
    save();
  }
}
function checkDelivery() {
  if (!state.delivery) return;
  if (Date.now()>=state.delivery.endsAt) {
    state.coins=Math.round((state.coins+state.delivery.earnings)*100)/100;
    showNotif('💰 Доставка прибыла! +🪙'+fmt(state.delivery.earnings));
    state.delivery=null; updateUI(); save();
    if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  } else if (currentTab==='market') renderMarket();
}
function tick() {
  var now=Date.now(), dt=(now-lastAuto)/1000; lastAuto=now;
  if (state.autoPerSec>0) {
    var earned=Math.round(state.autoPerSec*dt*state.tapPower*10)/100;
    if (earned>0) {
      state.coins=Math.round((state.coins+earned)*100)/100;
      state.caught+=Math.ceil(earned);
      var af=randFish(); state.caughtFish[af.name]=(state.caughtFish[af.name]||0)+Math.ceil(earned);
      unlockFish(); updateUI(); save();
    }
  }
  checkDeaths(); checkDelivery();
  if (Date.now()-lastPriceUpdate>=PRICE_INTERVAL) updatePrices();
  var te=document.getElementById('mkt-timer');
  if (te) te.textContent=Math.max(0,Math.ceil((lastPriceUpdate+PRICE_INTERVAL-Date.now())/1000))+'с';
  setTimeout(tick,500);
}

// ── Запуск ────────────────────────────────────────────
load();
processOffline();
initPrices();
if (!lastPriceUpdate) { updatePrices(); lastPriceUpdate=Date.now(); }
calcStats();
var il=getLoc();
var oc=document.getElementById('ocean');
oc.style.background=il.bg; oc.style.borderBottomColor=il.border;
document.getElementById('loc-label').textContent=il.emoji+' '+il.name;
for (var bi=0;bi<LOCATIONS.length;bi++) if(state.unlockedLocs.indexOf(LOCATIONS[bi].id)>=0) LOCATIONS[bi].unlocked=true;
spawnBubbles(); renderLocBar(); updateUI(); setTimeout(tick,500);
</script>
</body>
