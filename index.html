<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Рыбная ферма</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;overflow-x:hidden}
#ocean{width:100%;height:180px;position:relative;overflow:hidden;cursor:pointer;border-bottom:3px solid #1565c0;-webkit-tap-highlight-color:transparent;transition:background 0.6s}
.bubble{position:absolute;border-radius:50%;animation:rise 3s infinite ease-in}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:.6}100%{transform:translateY(-180px) scale(.3);opacity:0}}
.tap-anim{position:absolute;pointer-events:none;font-size:26px;animation:popfish .8s ease-out forwards}
.plus-anim{position:absolute;pointer-events:none;font-size:14px;font-weight:700;color:#FFD700;animation:floatup .9s ease-out forwards}
@keyframes popfish{0%{transform:scale(.5);opacity:1}50%{transform:scale(1.4);opacity:1}100%{transform:scale(1) translateY(-50px);opacity:0}}
@keyframes floatup{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-55px);opacity:0}}
#hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:rgba(255,255,255,.7);text-align:center;pointer-events:none;transition:opacity .5s}
#loc-bar{display:flex;overflow-x:auto;gap:6px;padding:8px 10px;background:#16213e;scrollbar-width:none}
#loc-bar::-webkit-scrollbar{display:none}
.loc-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid #0f3460;background:#0f3460;color:#90caf9;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.loc-btn.active{background:#1565c0;border-color:#1565c0;color:#fff}
.loc-btn.locked{opacity:.4;cursor:not-allowed}
#stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 10px;background:#16213e}
.st{background:#0f3460;border-radius:10px;padding:8px 4px;text-align:center}
.st b{display:block;font-size:16px;font-weight:700;color:#fff}
.st span{font-size:10px;color:#90caf9}
#tabs{display:flex;background:#16213e;border-bottom:1px solid #0f3460}
.tab{flex:1;padding:8px 2px;text-align:center;font-size:11px;cursor:pointer;color:#90caf9;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#FFD700;border-bottom-color:#FFD700}
#content{padding:10px;padding-bottom:20px}
.upg{display:flex;align-items:center;gap:10px;background:#0f3460;border-radius:12px;padding:10px 12px;margin-bottom:8px}
.upg .ico{font-size:22px}
.upg .inf{flex:1}
.upg .inf .n{font-size:14px;font-weight:600;color:#fff}
.upg .inf .d{font-size:11px;color:#90caf9;margin-top:2px}
.upg button,.mkt-btn{background:#1565c0;color:#fff;border:none;border-radius:8px;padding:7px 10px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.upg button:disabled,.mkt-btn:disabled{background:#333;color:#666;cursor:not-allowed}
.upg button:active,.mkt-btn:active{transform:scale(.95)}
.fish-item{display:flex;align-items:center;gap:10px;background:#0f3460;border-radius:12px;padding:10px 12px;margin-bottom:8px}
.fish-item .ico{font-size:22px;width:30px;text-align:center}
.fish-item .inf{flex:1}
.fish-item .inf .n{font-size:13px;font-weight:600;color:#fff}
.bar-bg{height:5px;background:#1a1a2e;border-radius:3px;margin-top:5px}
.bar-fill{height:5px;border-radius:3px;transition:width .3s}
.locked-item{opacity:.4;filter:grayscale(1)}
.badge{font-size:10px;background:#1565c0;color:#90caf9;padding:2px 7px;border-radius:6px}
.loc-card{background:#0f3460;border-radius:12px;padding:14px;margin-bottom:10px}
.loc-card h4{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px}
.loc-card p{font-size:12px;color:#90caf9;margin-bottom:10px}
.loc-card button{background:#1565c0;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer}
.loc-card button:disabled{background:#333;color:#666;cursor:not-allowed}
.loc-card.current{border:1.5px solid #FFD700}
.mkt-item{display:flex;align-items:center;gap:10px;background:#0f3460;border-radius:12px;padding:10px 12px;margin-bottom:8px}
.mkt-item .ico{font-size:22px;width:30px;text-align:center}
.mkt-item .inf{flex:1}
.mkt-item .inf .n{font-size:13px;font-weight:600;color:#fff}
.mkt-item .inf .pr{font-size:12px;margin-top:3px}
.mkt-btns{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.sell-all{background:#1a7a40!important;font-size:10px!important}
.price-up{color:#4caf50}
.price-down{color:#f44336}
.price-flat{color:#90caf9}
.notif{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0f3460;border:1.5px solid #1565c0;border-radius:12px;padding:10px 16px;font-size:13px;color:#fff;z-index:999;animation:slideup .3s ease-out,fadeout .5s ease-in 2.5s forwards;white-space:nowrap;max-width:90vw;text-align:center}
.notif.dead{border-color:#c0392b}
@keyframes slideup{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes fadeout{to{opacity:0}}
</style>
</head>
<body>
<div id="ocean" ontouchstart="tapOcean(event)" onclick="tapOcean(event)">
  <div id="hint">🎣 Тапай чтобы ловить рыбу!</div>
  <div id="loc-label" style="position:absolute;top:10px;left:12px;font-size:12px;font-weight:600;color:rgba(255,255,255,.8);pointer-events:none"></div>
</div>
<div id="loc-bar"></div>
<div id="stats">
  <div class="st"><b id="s-coins">0</b><span>🪙 монет</span></div>
  <div class="st"><b id="s-live">0</b><span>🐠 живых</span></div>
  <div class="st"><b id="s-tap">+0.1</b><span>за тап</span></div>
  <div class="st"><b id="s-auto">0</b><span>🎣 авто/сек</span></div>
</div>
<div id="tabs">
  <div class="tab active" onclick="showTab('upgrades')">⬆️ Улучш.</div>
  <div class="tab" onclick="showTab('aquarium')">🐠 Рыбы</div>
  <div class="tab" onclick="showTab('market')">🏪 Рынок</div>
  <div class="tab" onclick="showTab('locations')">🗺 Локации</div>
  <div class="tab" onclick="showTab('settings')">⚙️</div>
</div>
<div id="content"></div>

<script>
try {

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#1a1a2e'); tg.setBackgroundColor('#1a1a2e'); }

const LOCATIONS = [
  {id:'pond',    name:'Пруд',    emoji:'🌿', bg:'#1a3a2a', border:'#2d6a4f', bubble:'rgba(80,200,120,.15)', cost:0,       unlocked:true,  tapMult:1   },
  {id:'river',   name:'Река',    emoji:'🏞', bg:'#0d2b45', border:'#1a6b8a', bubble:'rgba(80,160,220,.15)', cost:5000,    unlocked:false, tapMult:2   },
  {id:'tropics', name:'Тропики', emoji:'🌴', bg:'#1a2a0a', border:'#4a8a1a', bubble:'rgba(150,220,80,.15)', cost:30000,   unlocked:false, tapMult:5   },
  {id:'deep',    name:'Глубины', emoji:'🌊', bg:'#050a2a', border:'#1a1a8a', bubble:'rgba(50,50,200,.15)',  cost:150000,  unlocked:false, tapMult:15  },
  {id:'space',   name:'Космос',  emoji:'🚀', bg:'#05050f', border:'#4a1a8a', bubble:'rgba(150,50,220,.15)', cost:1000000, unlocked:false, tapMult:50  },
];

const FISH = {
  pond:    [
    {emoji:'🐟',name:'Карась',      rate:1.0, need:0,      life:2 },
    {emoji:'🐠',name:'Красноперка', rate:0.5, need:10,     life:4 },
    {emoji:'🐟',name:'Лещ',         rate:0.2, need:50,     life:8 },
    {emoji:'🐡',name:'Щука',        rate:0.08,need:200,    life:16},
  ],
  river:   [
    {emoji:'🐡',name:'Окунь',       rate:1.0, need:0,      life:2 },
    {emoji:'🦦',name:'Выдра',       rate:0.4, need:700,    life:5 },
    {emoji:'🐊',name:'Крокодил',    rate:0.15,need:2000,   life:10},
    {emoji:'🦛',name:'Гиппо',       rate:0.05,need:5000,   life:20},
  ],
  tropics: [
    {emoji:'🐠',name:'Тропик',      rate:1.0, need:0,      life:3 },
    {emoji:'🦜',name:'Попугай',     rate:0.4, need:4000,   life:6 },
    {emoji:'🐍',name:'Змея',        rate:0.15,need:8000,   life:12},
    {emoji:'🦋',name:'Бабочка',     rate:0.05,need:20000,  life:24},
  ],
  deep:    [
    {emoji:'🦑',name:'Кальмар',     rate:1.0, need:0,      life:4 },
    {emoji:'🐙',name:'Осьминог',    rate:0.4, need:18000,  life:8 },
    {emoji:'🦈',name:'Акула',       rate:0.15,need:30000,  life:16},
    {emoji:'🐳',name:'Кит',         rate:0.04,need:80000,  life:24},
  ],
  space:   [
    {emoji:'👾',name:'Пришелец',    rate:1.0, need:0,      life:6 },
    {emoji:'🛸',name:'НЛО',         rate:0.3, need:120000, life:12},
    {emoji:'🌌',name:'Галактика',   rate:0.1, need:300000, life:20},
    {emoji:'⭐',name:'Звезда',      rate:0.03,need:1000000,life:24},
  ],
};

const ALL_FISH_FLAT = Object.values(FISH).flat();

const BASE_PRICES = {
  'Карась':5,'Красноперка':12,'Лещ':25,'Щука':60,
  'Окунь':8,'Выдра':20,'Крокодил':50,'Гиппо':130,
  'Тропик':15,'Попугай':40,'Змея':100,'Бабочка':280,
  'Кальмар':30,'Осьминог':80,'Акула':200,'Кит':600,
  'Пришелец':100,'НЛО':300,'Галактика':800,'Звезда':2500,
};

const UPGRADES = [
  {id:'rod',  name:'Удочка', emoji:'🎣', desc:'×2 монеты за тап',  costs:[20,80,300,1000],  bought:0, max:4},
  {id:'net',  name:'Сеть',   emoji:'🕸', desc:'+2 авто-улова/сек', costs:[50,200,800,3000], bought:0, max:4},
  {id:'boat', name:'Лодка',  emoji:'⛵', desc:'+3 к авто-улову',   costs:[150,600,2500],    bought:0, max:3},
  {id:'sonar',name:'Сонар',  emoji:'📡', desc:'+2 ко всему',       costs:[500,2500,10000],  bought:0, max:3},
];

let state = {
  coins:0, caught:0, tapPower:0.1, autoPerSec:0,
  currentLoc:'pond', unlockedLocs:['pond'],
  unlockedFish:{pond:['Карась']}, caughtFish:{}, liveFish:[]
};

let marketPrices = {};
let lastPriceUpdate = 0;
const PRICE_INTERVAL = 30000;
let currentTab = 'upgrades';
let tapped = false;
let lastAuto = Date.now();

// ── Helpers ──────────────────────────────────────────
function fmt(c) {
  if (typeof c !== 'number' || isNaN(c)) return '0';
  if (c >= 1000000) return (c/1000000).toFixed(2)+'M';
  if (c >= 1000)    return (c/1000).toFixed(1)+'k';
  return c.toFixed(1);
}

function getLoc(id) { return LOCATIONS.find(l=>l.id===(id||state.currentLoc)); }

// ── Market ───────────────────────────────────────────
function initPrices() {
  Object.entries(BASE_PRICES).forEach(([n,base])=>{
    if (!marketPrices[n]) marketPrices[n]={cur:base,prev:base,trend:0};
  });
}

function updatePrices() {
  Object.entries(BASE_PRICES).forEach(([n,base])=>{
    const p=marketPrices[n];
    const chg=(Math.random()-.48)*.3;
    const nv=Math.max(base*.3,Math.min(base*3,p.cur*(1+chg)));
    p.prev=p.cur; p.cur=Math.round(nv*10)/10;
    p.trend=p.cur>p.prev?1:p.cur<p.prev?-1:0;
  });
  lastPriceUpdate=Date.now();
  if (currentTab==='market') renderMarket();
}

// ── Save/Load ─────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('ff3', JSON.stringify({
      coins:state.coins, caught:state.caught,
      loc:state.currentLoc, ulocs:state.unlockedLocs,
      ufish:state.unlockedFish, cfish:state.caughtFish,
      live:state.liveFish,
      upg:Object.fromEntries(UPGRADES.map(u=>[u.id,u.bought])),
      prices:marketPrices, priceTs:lastPriceUpdate,
    }));
  } catch(e){}
}

function load() {
  try {
    const s=JSON.parse(localStorage.getItem('ff3')||'null');
    if (!s) return;
    state.coins=s.coins||0; state.caught=s.caught||0;
    state.currentLoc=s.loc||'pond';
    state.unlockedLocs=s.ulocs||['pond'];
    state.unlockedFish=s.ufish||{pond:['Карась']};
    state.caughtFish=s.cfish||{};
    state.liveFish=s.live||[];
    UPGRADES.forEach(u=>{ if(s.upg?.[u.id]) u.bought=s.upg[u.id]; });
    LOCATIONS.forEach(l=>{ if(state.unlockedLocs.includes(l.id)) l.unlocked=true; });
    if (s.prices) marketPrices=s.prices;
    if (s.priceTs) lastPriceUpdate=s.priceTs;
  } catch(e){}
}

// ── Calc ──────────────────────────────────────────────
function calcStats() {
  let tm=1, auto=0;
  UPGRADES.forEach(u=>{
    if(u.id==='rod')   tm   += (Math.pow(2,u.bought)-1);
    if(u.id==='net')   auto += 2*u.bought;
    if(u.id==='boat')  auto += 3*u.bought;
    if(u.id==='sonar') { tm+=2*u.bought; auto+=2*u.bought; }
  });
  const lm=getLoc()?.tapMult||1;
  state.tapPower=Math.round(.1*tm*lm*10)/10;
  state.autoPerSec=Math.round(auto*10)/10;
}

function unlockFish() {
  const loc=state.currentLoc;
  if (!state.unlockedFish[loc]) state.unlockedFish[loc]=[];
  (FISH[loc]||[]).forEach(f=>{
    if (!state.unlockedFish[loc].includes(f.name)&&state.coins>=f.need)
      state.unlockedFish[loc].push(f.name);
  });
}

function randFish() {
  const loc=state.currentLoc;
  const pool=(FISH[loc]||[]).filter(f=>(state.unlockedFish[loc]||[]).includes(f.name));
  if (!pool.length) return (FISH[loc]||[])[0]||{emoji:'🐟',name:'Рыба',life:1};
  const tot=pool.reduce((s,f)=>s+f.rate,0);
  let r=Math.random()*tot;
  for(const f of pool){r-=f.rate;if(r<=0)return f;}
  return pool[0];
}

// ── UI ────────────────────────────────────────────────
function showNotif(msg, dead=false) {
  const el=document.createElement('div');
  el.className='notif'+(dead?' dead':'');
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

function spawnAnim(x,y,emoji,label) {
  const ocean=document.getElementById('ocean');
  const el=document.createElement('div');
  el.className='tap-anim'; el.textContent=emoji;
  el.style.cssText=`left:${x-13}px;top:${y-13}px`;
  ocean.appendChild(el);
  const plus=document.createElement('div');
  plus.className='plus-anim'; plus.textContent=label;
  plus.style.cssText=`left:${x+8}px;top:${y-5}px`;
  ocean.appendChild(plus);
  setTimeout(()=>{el.remove();plus.remove();},900);
}

function spawnBubbles() {
  const ocean=document.getElementById('ocean');
  ocean.querySelectorAll('.bubble').forEach(b=>b.remove());
  const color=getLoc()?.bubble||'rgba(100,180,255,.15)';
  for(let i=0;i<5;i++){
    const b=document.createElement('div');
    b.className='bubble';
    const sz=6+Math.random()*14;
    b.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*95}%;bottom:0;background:${color};animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*2}s`;
    ocean.appendChild(b);
  }
}

function renderLocBar() {
  document.getElementById('loc-bar').innerHTML=LOCATIONS.map(l=>{
    const act=l.id===state.currentLoc;
    const cls=!l.unlocked?'loc-btn locked':act?'loc-btn active':'loc-btn';
    return `<div class="${cls}" onclick="${l.unlocked?"switchLoc('"+l.id+"')":'showTab(\'locations\')'}">
      ${l.emoji} ${l.name}
    </div>`;
  }).join('');
}

function updateUI() {
  document.getElementById('s-coins').textContent=fmt(state.coins);
  document.getElementById('s-live').textContent=state.liveFish.length;
  document.getElementById('s-tap').textContent='+'+state.tapPower.toFixed(1);
  document.getElementById('s-auto').textContent=state.autoPerSec;
  renderContent();
}

function showTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',
      (i===0&&tab==='upgrades')||(i===1&&tab==='aquarium')||
      (i===2&&tab==='market')||(i===3&&tab==='locations')||(i===4&&tab==='settings')
    );
  });
  renderContent();
}

function renderContent() {
  if(currentTab==='upgrades')       renderUpgrades();
  else if(currentTab==='aquarium')  renderAquarium();
  else if(currentTab==='market')    renderMarket();
  else if(currentTab==='locations') renderLocations();
  else                              renderSettings();
}

// ── Tabs ─────────────────────────────────────────────
function renderUpgrades() {
  document.getElementById('content').innerHTML=UPGRADES.map(u=>{
    const maxed=u.bought>=u.max;
    const cost=maxed?0:u.costs[u.bought];
    const canBuy=!maxed&&state.coins>=cost;
    return `<div class="upg">
      <span class="ico">${u.emoji}</span>
      <div class="inf">
        <div class="n">${u.name} ${u.bought>0?'<span class="badge">ур.'+u.bought+'</span>':''}</div>
        <div class="d">${u.desc}</div>
      </div>
      <button onclick="buyUpgrade('${u.id}')" ${!canBuy?'disabled':''}>
        ${maxed?'Макс ✓':'🪙 '+cost}
      </button>
    </div>`;
  }).join('');
}

function renderAquarium() {
  const loc=state.currentLoc;
  const fish=FISH[loc]||[];
  const ulocked=state.unlockedFish[loc]||[];
  const pool=fish.filter(f=>ulocked.includes(f.name));
  const tot=pool.reduce((s,f)=>s+f.rate,0);
  const li=getLoc();
  document.getElementById('content').innerHTML=
    `<div style="font-size:12px;color:#90caf9;margin-bottom:10px;padding:8px 10px;background:#0f3460;border-radius:10px">
      ${li.emoji} <b style="color:#fff">${li.name}</b> — рыбы этой локации
    </div>`+
    fish.map(f=>{
      const isUl=ulocked.includes(f.name);
      if(!isUl) return `<div class="fish-item locked-item">
        <span class="ico">🔒</span>
        <div class="inf"><div class="n">???</div>
        <div class="d">${f.need>0?'Нужно '+fmt(f.need)+' монет':'Открывается на локации'}</div></div>
      </div>`;
      const pct=tot>0?Math.round(f.rate/tot*100):0;
      const alive=state.liveFish.filter(x=>x.name===f.name).length;
      return `<div class="fish-item">
        <span class="ico">${f.emoji}</span>
        <div class="inf">
          <div class="n">${f.name}
            <span class="badge">${pct}% шанс</span>
            ${alive>0
              ?'<span class="badge" style="background:#0a2a0a;color:#6ddc6d">🐠 '+alive+' живых</span>'
              :'<span class="badge" style="background:#2a0a0a;color:#888">нет</span>'}
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${li.border}"></div></div>
        </div>
      </div>`;
    }).join('');
}

function renderMarket() {
  const next=Math.max(0,Math.ceil((lastPriceUpdate+PRICE_INTERVAL-Date.now())/1000));
  let html=`<div style="background:#0f3460;border-radius:10px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:12px;color:#90caf9">🏪 Рынок рыбы</span>
    <span style="font-size:11px;color:#666">Обновление через <b id="mkt-timer" style="color:#FFD700">${next}с</b></span>
  </div>`;

  const grouped={};
  state.liveFish.forEach(f=>{grouped[f.name]=(grouped[f.name]||0)+1;});

  if(Object.keys(grouped).length===0){
    html+=`<div style="text-align:center;padding:30px;color:#666;font-size:13px">🐟 Нет рыбы на складе<br><span style="font-size:11px">Иди лови!</span></div>`;
  } else {
    html+=Object.entries(grouped).map(([name,cnt])=>{
      const def=ALL_FISH_FLAT.find(f=>f.name===name);
      const bp=BASE_PRICES[name]||1;
      const mp=marketPrices[name]||{cur:bp,trend:0};
      const total=Math.round(mp.cur*cnt*10)/10;
      const ti=mp.trend>0?'📈':mp.trend<0?'📉':'➡️';
      const tc=mp.trend>0?'price-up':mp.trend<0?'price-down':'price-flat';
      const diff=Math.round((mp.cur-bp)/bp*100);
      const ds=diff>0?'+'+diff+'%':diff+'%';
      return `<div class="mkt-item">
        <span class="ico">${def?.emoji||'🐟'}</span>
        <div class="inf">
          <div class="n">${name} <span class="badge">×${cnt}</span></div>
          <div class="pr">
            <span class="${tc}">${ti} ${fmt(mp.cur)}/шт</span>
            <span style="color:#555;font-size:10px;margin-left:6px">${ds}</span>
          </div>
        </div>
        <div class="mkt-btns">
          <button class="mkt-btn" onclick="sell('${name}',1)">🪙${fmt(mp.cur)}</button>
          ${cnt>1?`<button class="mkt-btn sell-all" onclick="sell('${name}',${cnt})">Всё 🪙${fmt(total)}</button>`:''}
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('content').innerHTML=html;
}

function renderLocations() {
  document.getElementById('content').innerHTML=LOCATIONS.map(loc=>{
    const isCur=loc.id===state.currentLoc;
    const canU=!loc.unlocked&&state.coins>=loc.cost;
    return `<div class="loc-card ${isCur?'current':''}">
      <h4>${loc.emoji} ${loc.name} ${isCur?'<span class="badge">текущая</span>':''}</h4>
      <p>×${loc.tapMult} к монетам ${loc.cost>0?'· Открыть: 🪙'+fmt(loc.cost):''}</p>
      ${loc.unlocked
        ?(isCur?'<button disabled>Здесь</button>':`<button onclick="switchLoc('${loc.id}')">Перейти</button>`)
        :`<button onclick="unlockLoc('${loc.id}')" ${!canU?'disabled':''}>🔓 Открыть 🪙${fmt(loc.cost)}</button>`}
    </div>`;
  }).join('');
}

function renderSettings() {
  const li=getLoc();
  document.getElementById('content').innerHTML=`
    <div style="padding:4px 0">
      <div style="background:#0f3460;border-radius:12px;padding:16px;margin-bottom:10px">
        <div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:8px">Статистика</div>
        <div style="font-size:12px;color:#90caf9;line-height:2">
          Монет: ${fmt(state.coins)}<br>
          Живых рыб: ${state.liveFish.length}<br>
          За тап: ${state.tapPower.toFixed(1)}<br>
          Авто/сек: ${state.autoPerSec}<br>
          Локация: ${li?.emoji} ${li?.name}
        </div>
      </div>
      <div style="background:#3d0f0f;border-radius:12px;padding:16px">
        <div style="font-size:14px;font-weight:600;color:#ff6b6b;margin-bottom:6px">Сброс прогресса</div>
        <div style="font-size:12px;color:#ff9999;margin-bottom:12px">Весь прогресс будет удалён безвозвратно</div>
        <button onclick="resetGame()" style="background:#c0392b;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;width:100%">
          🗑 Сбросить прогресс
        </button>
      </div>
    </div>`;
}

// ── Actions ───────────────────────────────────────────
function tapOcean(e) {
  e.preventDefault();
  const touch=e.touches?.[0]||e;
  const rect=document.getElementById('ocean').getBoundingClientRect();
  const x=(touch.clientX||touch.pageX)-rect.left;
  const y=(touch.clientY||touch.pageY)-rect.top;
  if(!tapped){document.getElementById('hint').style.opacity='0';tapped=true;}
  const f=randFish();
  const earned=state.tapPower;
  state.coins=Math.round((state.coins+earned)*100)/100;
  state.caught++;
  state.caughtFish[f.name]=(state.caughtFish[f.name]||0)+1;
  state.liveFish.push({name:f.name,emoji:f.emoji,dieAt:Date.now()+f.life*3600000});
  unlockFish();
  spawnAnim(x,y,f.emoji,'+'+earned.toFixed(1));
  updateUI(); save();
  if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

function buyUpgrade(id) {
  const u=UPGRADES.find(x=>x.id===id);
  if(!u||u.bought>=u.max) return;
  const cost=u.costs[u.bought];
  if(state.coins<cost) return;
  state.coins=Math.round((state.coins-cost)*100)/100;
  u.bought++;
  calcStats(); unlockFish(); updateUI(); save();
  if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

function sell(name,count) {
  const mp=marketPrices[name];
  if(!mp) return;
  let sold=0;
  for(let i=0;i<count;i++){
    const idx=state.liveFish.findIndex(f=>f.name===name);
    if(idx===-1) break;
    state.liveFish.splice(idx,1); sold++;
  }
  if(!sold) return;
  const earned=Math.round(mp.cur*sold*100)/100;
  state.coins=Math.round((state.coins+earned)*100)/100;
  showNotif('💰 '+sold+'× '+name+' → 🪙'+fmt(earned));
  updateUI(); save();
  if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

function switchLoc(id) {
  const loc=LOCATIONS.find(l=>l.id===id);
  if(!loc||!loc.unlocked) return;
  state.currentLoc=id;
  const ocean=document.getElementById('ocean');
  ocean.style.background=loc.bg;
  ocean.style.borderBottomColor=loc.border;
  document.getElementById('loc-label').textContent=loc.emoji+' '+loc.name;
  spawnBubbles(); calcStats(); renderLocBar(); updateUI(); save();
}

function unlockLoc(id) {
  const loc=LOCATIONS.find(l=>l.id===id);
  if(!loc||loc.unlocked||state.coins<loc.cost) return;
  state.coins=Math.round((state.coins-loc.cost)*100)/100;
  loc.unlocked=true;
  state.unlockedLocs.push(id);
  if(!state.unlockedFish[id]) state.unlockedFish[id]=[(FISH[id]||[])[0]?.name||''];
  renderLocBar(); updateUI(); save();
  if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

function resetGame() {
  if(!confirm('Сбросить весь прогресс? Это нельзя отменить.')) return;
  if(!confirm('Вы уверены? Весь прогресс будет удалён навсегда!')) return;
  localStorage.removeItem('ff3');
  state={coins:0,caught:0,tapPower:0.1,autoPerSec:0,currentLoc:'pond',unlockedLocs:['pond'],unlockedFish:{pond:['Карась']},caughtFish:{},liveFish:[]};
  UPGRADES.forEach(u=>u.bought=0);
  LOCATIONS.forEach((l,i)=>{l.unlocked=i===0;});
  marketPrices={}; initPrices(); lastPriceUpdate=Date.now();
  tapped=false;
  document.getElementById('hint').style.opacity='1';
  calcStats(); switchLoc('pond'); showTab('upgrades');
}

// ── Tick ─────────────────────────────────────────────
function checkDeaths() {
  const now=Date.now();
  const dead=state.liveFish.filter(f=>f.dieAt<=now);
  if(dead.length){
    state.liveFish=state.liveFish.filter(f=>f.dieAt>now);
    dead.forEach(f=>showNotif('💀 '+f.emoji+' '+f.name+' погибла!',true));
    save();
  }
}

function tick() {
  const now=Date.now(), dt=(now-lastAuto)/1000;
  lastAuto=now;
  if(state.autoPerSec>0){
    const earned=Math.round(state.autoPerSec*dt*state.tapPower*10)/100;
    if(earned>0){
      state.coins=Math.round((state.coins+earned)*100)/100;
      state.caught+=Math.ceil(earned);
      const af=randFish();
      state.caughtFish[af.name]=(state.caughtFish[af.name]||0)+Math.ceil(earned);
      unlockFish(); updateUI(); save();
      const ocean=document.getElementById('ocean');
      spawnAnim(Math.random()*(ocean.offsetWidth-40)+20, Math.random()*120+20, af.emoji, '+'+earned.toFixed(1));
    }
  }
  checkDeaths();
  if(Date.now()-lastPriceUpdate>=PRICE_INTERVAL) updatePrices();
  const te=document.getElementById('mkt-timer');
  if(te) te.textContent=Math.max(0,Math.ceil((lastPriceUpdate+PRICE_INTERVAL-Date.now())/1000))+'с';
  setTimeout(tick,500);
}

// ── Boot ─────────────────────────────────────────────
load();
initPrices();
if(!lastPriceUpdate) { updatePrices(); lastPriceUpdate=Date.now(); }
calcStats();
const il=getLoc();
const oc=document.getElementById('ocean');
oc.style.background=il.bg;
oc.style.borderBottomColor=il.border;
document.getElementById('loc-label').textContent=il.emoji+' '+il.name;
LOCATIONS.forEach(l=>{if(state.unlockedLocs.includes(l.id))l.unlocked=true;});
spawnBubbles();
renderLocBar();
updateUI();
setTimeout(tick,500);

} catch(err) {
  document.body.innerHTML='<div style="color:red;padding:20px;font-size:12px">Ошибка: '+err.message+'<br>'+err.stack+'</div>';
}
</script>
</body>
</html>
