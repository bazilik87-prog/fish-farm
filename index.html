<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Рыбная ферма</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #ocean {
    width: 100%;
    height: 180px;
    background: #0a3d6b;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border-bottom: 3px solid #1565c0;
    -webkit-tap-highlight-color: transparent;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(100,180,255,0.15);
    animation: rise 3s infinite ease-in;
  }
  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0.6; }
    100% { transform: translateY(-180px) scale(0.3); opacity: 0; }
  }
  .tap-anim {
    position: absolute;
    pointer-events: none;
    font-size: 26px;
    animation: popfish 0.8s ease-out forwards;
  }
  .plus-anim {
    position: absolute;
    pointer-events: none;
    font-size: 14px;
    font-weight: 700;
    color: #FFD700;
    animation: floatup 0.9s ease-out forwards;
  }
  @keyframes popfish {
    0%   { transform: scale(0.5); opacity: 1; }
    50%  { transform: scale(1.4); opacity: 1; }
    100% { transform: scale(1) translateY(-50px); opacity: 0; }
  }
  @keyframes floatup {
    0%   { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-55px); opacity: 0; }
  }
  #hint {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px; color: rgba(255,255,255,0.6);
    text-align: center; pointer-events: none;
    transition: opacity 0.5s;
  }
  #stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 10px;
    background: #16213e;
  }
  .st {
    background: #0f3460;
    border-radius: 10px;
    padding: 8px 4px;
    text-align: center;
  }
  .st b { display: block; font-size: 16px; font-weight: 700; color: #fff; }
  .st span { font-size: 10px; color: #90caf9; }
  #tabs {
    display: flex;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
  }
  .tab {
    flex: 1; padding: 10px; text-align: center;
    font-size: 13px; cursor: pointer;
    color: #90caf9; border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: #FFD700; border-bottom-color: #FFD700; }
  #content { padding: 10px; }
  .upg {
    display: flex; align-items: center; gap: 10px;
    background: #0f3460; border-radius: 12px;
    padding: 10px 12px; margin-bottom: 8px;
  }
  .upg .ico { font-size: 22px; }
  .upg .inf { flex: 1; }
  .upg .inf .n { font-size: 14px; font-weight: 600; color: #fff; }
  .upg .inf .d { font-size: 11px; color: #90caf9; margin-top: 2px; }
  .upg button {
    background: #1565c0; color: #fff; border: none;
    border-radius: 8px; padding: 7px 12px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    white-space: nowrap; -webkit-tap-highlight-color: transparent;
  }
  .upg button:disabled { background: #333; color: #666; cursor: not-allowed; }
  .upg button:active { transform: scale(0.95); }
  .fish-item {
    display: flex; align-items: center; gap: 10px;
    background: #0f3460; border-radius: 12px;
    padding: 10px 12px; margin-bottom: 8px;
  }
  .fish-item .ico { font-size: 22px; }
  .fish-item .inf { flex: 1; }
  .fish-item .inf .n { font-size: 13px; font-weight: 600; color: #fff; }
  .bar-bg { height: 5px; background: #1a1a2e; border-radius: 3px; margin-top: 5px; }
  .bar-fill { height: 5px; background: #1565c0; border-radius: 3px; transition: width 0.3s; }
  .locked-item { opacity: 0.45; filter: grayscale(1); }
  .badge {
    font-size: 10px; background: #1565c0; color: #90caf9;
    padding: 2px 7px; border-radius: 6px;
  }
</style>
</head>
<body>

<div id="ocean" ontouchstart="tapOcean(event)" onclick="tapOcean(event)">
  <div id="hint">🎣 Тапай чтобы ловить рыбу!</div>
</div>

<div id="stats">
  <div class="st"><b id="s-coins">0</b><span>🪙 монет</span></div>
  <div class="st"><b id="s-fish">0</b><span>🐟 поймано</span></div>
  <div class="st"><b id="s-tap">+1</b><span>за тап</span></div>
  <div class="st"><b id="s-auto">0</b><span>🎣 авто/сек</span></div>
</div>

<div id="tabs">
  <div class="tab active" onclick="showTab('upgrades')">⬆️ Улучшения</div>
  <div class="tab" onclick="showTab('aquarium')">🐠 Аквариум</div>
</div>

<div id="content"></div>

<script>
// Инициализация Telegram WebApp
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#1a1a2e');
  tg.setBackgroundColor('#1a1a2e');
}

const UPGRADES = [
  { id:'rod',   name:'Удочка',  emoji:'🎣', desc:'×2 монеты за тап',   costs:[20,80,300,1000],  bought:0, max:4 },
  { id:'net',   name:'Сеть',    emoji:'🕸', desc:'+2 авто-улова/сек',  costs:[50,200,800,3000], bought:0, max:4 },
  { id:'boat',  name:'Лодка',   emoji:'⛵', desc:'×3 к авто-улову',    costs:[150,600,2500],    bought:0, max:3 },
  { id:'sonar', name:'Сонар',   emoji:'📡', desc:'×2 ко всему',        costs:[500,2500,10000],  bought:0, max:3 },
];

const FISH = [
  { emoji:'🐟', name:'Рыбка',    rate:1.0,  unlocked:true,  needCoins:0    },
  { emoji:'🐠', name:'Тропик',   rate:0.4,  unlocked:false, needCoins:30   },
  { emoji:'🐡', name:'Шар',      rate:0.2,  unlocked:false, needCoins:100  },
  { emoji:'🦈', name:'Акула',    rate:0.05, unlocked:false, needCoins:500  },
  { emoji:'🐙', name:'Осьминог', rate:0.02, unlocked:false, needCoins:2000 },
];

let state = { coins:0, caught:0, tapPower:1, autoPerSec:0 };
let currentTab = 'upgrades';
let tapped = false;
let lastAuto = Date.now();

// Загрузка прогресса из localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('fishfarm_save');
    if (saved) {
      const s = JSON.parse(saved);
      state.coins  = s.coins  || 0;
      state.caught = s.caught || 0;
      UPGRADES.forEach(u => { const b = s.upgrades?.[u.id]; if (b) u.bought = b; });
      FISH.forEach(f => { const ul = s.fish?.[f.name]; if (ul) f.unlocked = ul; });
      calcStats();
    }
  } catch(e) {}
}

function saveState() {
  const data = {
    coins: state.coins,
    caught: state.caught,
    upgrades: Object.fromEntries(UPGRADES.map(u => [u.id, u.bought])),
    fish: Object.fromEntries(FISH.map(f => [f.name, f.unlocked])),
  };
  localStorage.setItem('fishfarm_save', JSON.stringify(data));
}

function calcStats() {
  let tap = 1, auto = 0;
  UPGRADES.forEach(u => {
    if (u.id==='rod')   tap  *= Math.pow(2, u.bought);
    if (u.id==='net')   auto += 2 * u.bought;
    if (u.id==='boat' && u.bought > 0) auto *= Math.pow(3, u.bought);
    if (u.id==='sonar' && u.bought > 0) { tap *= Math.pow(2, u.bought); auto *= Math.pow(2, u.bought); }
  });
  state.tapPower   = Math.max(1, Math.round(tap));
  state.autoPerSec = Math.round(auto * 10) / 10;
}

function unlockFish() {
  FISH.forEach(f => { if (!f.unlocked && state.coins >= f.needCoins) f.unlocked = true; });
}

function randomFish() {
  const pool  = FISH.filter(f => f.unlocked);
  const total = pool.reduce((s, f) => s + f.rate, 0);
  let r = Math.random() * total;
  for (const f of pool) { r -= f.rate; if (r <= 0) return f; }
  return pool[0];
}

function tapOcean(e) {
  e.preventDefault();
  const touch = e.touches?.[0] || e;
  const rect  = document.getElementById('ocean').getBoundingClientRect();
  const x = (touch.clientX || touch.pageX) - rect.left;
  const y = (touch.clientY || touch.pageY) - rect.top;

  if (!tapped) { document.getElementById('hint').style.opacity = '0'; tapped = true; }

  const f      = randomFish();
  const earned = state.tapPower;
  state.coins += earned;
  state.caught++;
  unlockFish();

  spawnAnim(x, y, f.emoji, earned);
  updateUI();
  saveState();

  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

function spawnAnim(x, y, emoji, coins) {
  const ocean = document.getElementById('ocean');
  const el = document.createElement('div');
  el.className = 'tap-anim';
  el.textContent = emoji;
  el.style.cssText = `left:${x - 13}px;top:${y - 13}px;`;
  ocean.appendChild(el);

  const plus = document.createElement('div');
  plus.className = 'plus-anim';
  plus.textContent = '+' + coins;
  plus.style.cssText = `left:${x + 8}px;top:${y - 5}px;`;
  ocean.appendChild(plus);

  setTimeout(() => { el.remove(); plus.remove(); }, 900);
}

function spawnBubbles() {
  const ocean = document.getElementById('ocean');
  for (let i = 0; i < 5; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 6 + Math.random() * 14;
    b.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*95}%;bottom:0;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*2}s`;
    ocean.appendChild(b);
  }
}

function updateUI() {
  const c = state.coins;
  document.getElementById('s-coins').textContent = c >= 1000000 ? (c/1000000).toFixed(1)+'M' : c >= 1000 ? (c/1000).toFixed(1)+'k' : c;
  document.getElementById('s-fish').textContent  = state.caught >= 1000 ? (state.caught/1000).toFixed(1)+'k' : state.caught;
  document.getElementById('s-tap').textContent   = '+' + state.tapPower;
  document.getElementById('s-auto').textContent  = state.autoPerSec;
  renderContent();
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'upgrades') || (i === 1 && tab === 'aquarium'));
  });
  renderContent();
}

function renderContent() {
  if (currentTab === 'upgrades') renderUpgrades();
  else renderAquarium();
}

function renderUpgrades() {
  document.getElementById('content').innerHTML = UPGRADES.map(u => {
    const cost  = u.costs[u.bought];
    const maxed = u.bought >= u.max;
    const canBuy = !maxed && state.coins >= cost;
    return `<div class="upg">
      <span class="ico">${u.emoji}</span>
      <div class="inf">
        <div class="n">${u.name} ${u.bought > 0 ? '<span class="badge">ур. '+u.bought+'</span>' : ''}</div>
        <div class="d">${u.desc}</div>
      </div>
      <button onclick="buyUpgrade('${u.id}')" ${!canBuy ? 'disabled' : ''}>
        ${maxed ? 'Макс ✓' : '🪙 ' + cost}
      </button>
    </div>`;
  }).join('');
}

function renderAquarium() {
  const total = FISH.filter(f => f.unlocked).reduce((s, f) => s + f.rate, 0);
  document.getElementById('content').innerHTML = FISH.map(f => {
    if (!f.unlocked) {
      return `<div class="fish-item locked-item">
        <span class="ico">🔒</span>
        <div class="inf">
          <div class="n">???</div>
          <div class="d">Открывается при ${f.needCoins} монетах</div>
        </div>
      </div>`;
    }
    const pct = Math.round(f.rate / total * 100);
    const barPct = Math.round(f.rate / FISH[0].rate * 100);
    return `<div class="fish-item">
      <span class="ico">${f.emoji}</span>
      <div class="inf">
        <div class="n">${f.name} <span class="badge">${pct}% шанс</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,barPct)}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

function buyUpgrade(id) {
  const u = UPGRADES.find(x => x.id === id);
  if (!u || u.bought >= u.max) return;
  const cost = u.costs[u.bought];
  if (state.coins < cost) return;
  state.coins -= cost;
  u.bought++;
  calcStats();
  unlockFish();
  updateUI();
  saveState();
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

function autoTick() {
  const now = Date.now();
  const dt  = (now - lastAuto) / 1000;
  lastAuto  = now;
  if (state.autoPerSec > 0) {
    const earned = Math.floor(state.autoPerSec * dt * state.tapPower);
    if (earned > 0) {
      state.coins  += earned;
      state.caught += earned;
      unlockFish();
      updateUI();
      saveState();
      const ocean = document.getElementById('ocean');
      const x = Math.random() * (ocean.offsetWidth - 40) + 20;
      const y = Math.random() * 120 + 20;
      spawnAnim(x, y, randomFish().emoji, earned);
    }
  }
  setTimeout(autoTick, 500);
}

loadState();
spawnBubbles();
updateUI();
setTimeout(autoTick, 500);
</script>
</body>
</html>
