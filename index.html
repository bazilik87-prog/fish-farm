// ── Данные ────────────────────────────────────────────

  tropics:[{emoji:'🐠',name:'Тропик', rate:1.0, need:0,    life:1 },

           {emoji:'🐍',name:'Змея',   rate:0.15,need:800000, life:1},
           {emoji:'🦋',name:'Бабочка',rate:0.05,need:200000,life:1}],
  deep:   [{emoji:'🦑',name:'Кальмар', rate:1.0, need:0,    life:1 },
           {emoji:'🐙',name:'Осьминог',rate:0.4, need:180000,life:1 },
           {emoji:'🦈',name:'Акула',   rate:0.15,need:3000000,life:1},

  space:  [{emoji:'👾',name:'Пришелец', rate:1.0, need:0,      life:1 },

};

var ALL_FISH = [];
var k; for (k in FISH) { var i; for (i=0;i<FISH[k].length;i++) ALL_FISH.push(FISH[k][i]); }

var BASE_PRICES = {

};

// Время сушки в секундах (10 рыб → 1 пакет)
var DRY_TIME = {
  'Карась':3600,     'Красноперка':5400,  'Лещ':7200,      'Щука':10800,
  'Окунь':4800,      'Выдра':7200,        'Крокодил':10800, 'Гиппо':14400,
  'Тропик':5400,     'Попугай':9000,      'Змея':12600,    'Бабочка':18000,

  'Пришелец':10800,  'НЛО':14400,         'Галактика':21600,'Звезда':36000
};

var TRANSPORTS = [
  {id:'bike', name:'Велосипед',emoji:'🚲',capacity:5,  cost:0,     time:480,repairCost:50   },
  {id:'moped',name:'Мопед',    emoji:'🛵',capacity:15, cost:5000,  time:180,repairCost:500  },
  {id:'car',  name:'Машина',   emoji:'🚗',capacity:40, cost:50000, time:90, repairCost:5000 },
  {id:'truck',name:'Грузовик', emoji:'🚛',capacity:100,cost:300000,time:120,repairCost:30000}
];

var UPGRADES = [
  {id:'rod',  name:'Удочка',emoji:'🎣',desc:'x2 монеты + шанс улова',  costs:[200,800,3000,10000,30000],     bought:0,max:5},
  {id:'net',  name:'Сеть',  emoji:'🕸',desc:'+2 авто-улова/сек',       costs:[500,2000,8000,30000],           bought:0,max:4},
  {id:'boat', name:'Лодка', emoji:'⛵',desc:'+3 к авто-улову',         costs:[1500,6000,25000],               bought:0,max:3},
  {id:'sonar',name:'Сонар', emoji:'📡',desc:'+0.5 авто/сек за уровень',costs:[5000,25000,100000,300000,1000000],bought:0,max:5}
];

// Цена соли по локациям (пропорционально множителю)
var SALT_PRICE = {pond:1, river:2, tropics:5, deep:15, space:50};

var DAILY = [10,25,50,100,200,400,1000];

var QUEST_TEMPLATES = [
  {id:'catch50',    text:'Поймай 50 рыб',          type:'catch',    goal:50,   reward:30  },
  {id:'catch100',   text:'Поймай 100 рыб',         type:'catch',    goal:100,  reward:60  },

  {id:'sell1',      text:'Отправь 1 доставку',     type:'deliver',  goal:1,    reward:50  },
  {id:'sell3',      text:'Отправь 3 доставки',     type:'deliver',  goal:3,    reward:150 },
  {id:'dry1',       text:'Высуши 1 пакет',         type:'dry',      goal:1,    reward:80  },
  {id:'dry3',       text:'Высуши 3 пакета',        type:'dry',      goal:3,    reward:250 },
  {id:'earn500',    text:'Заработай 500 монет',    type:'earn',     goal:500,  reward:100 },
  {id:'earn1000',   text:'Заработай 1000 монет',   type:'earn',     goal:1000, reward:200 },
  {id:'catch_rare', text:'Поймай 10 редких рыб',  type:'rare',     goal:10,   reward:200 },
  {id:'repair1',    text:'Почини транспорт',       type:'repair',   goal:1,    reward:70  },
  {id:'catch20loc', text:'Поймай 20 рыб в локации',type:'catch', goal:20, reward:80  },
];

// ── Состояние ─────────────────────────────────────────
var state = {
  coins:0,caught:0,tapPower:0.1,autoPerSec:0,
  currentLoc:'pond',unlockedLocs:['pond'],
  unlockedFish:{pond:['Карась']},caughtFish:{},liveFish:[],
  transport:'bike',delivery:null,unlockedTransports:['bike'],
  durability:{bike:100,moped:100,car:100,truck:100},
  dailyDay:0,dailyLastClaim:0,lastSeen:0,selectedFish:null,selectedDried:false,
  drying:[],driedFish:[],
  boosts:{doubleTap:0, turboDlv:false, luckyRod:0, autoRepair:false},
  quests:[], questsDate:0, questProgress:{},
  salt:0,          // запас соли на складе
  saltOrder:0,     // сколько соли заказано в текущей доставке
  salting:[]       // [{name, emoji, packets, startedAt, endsAt}] — засолка
};

var marketPrices = {};
var lastPriceUpdate = 0;
var PRICE_INTERVAL = 30000;
var currentTab = 'upgrades';
var tapped = false;
var lastAuto = Date.now();
var lastTapTime = 0;
var tapTimes = [];
var scareFactor = 1.0;
var MAX_TPS = 5;

// ── Утилиты ───────────────────────────────────────────
function fmt(c) {
  if (typeof c !== 'number' || isNaN(c)) return '0';
  if (c >= 1000000) return (c/1000000).toFixed(2)+'M';
  if (c >= 1000) return (c/1000).toFixed(1)+'k';
  return c.toFixed(1);
}
function fmtTime(s) {
  var m = Math.floor(s/60); var r = s%60;
  return m>0 ? (m+'мин'+(r>0?' '+r+'с':'')) : s+'с';
}
function getLoc(id) {
  var lid = id||state.currentLoc;
  for (var i=0;i<LOCATIONS.length;i++) if (LOCATIONS[i].id===lid) return LOCATIONS[i];
  return LOCATIONS[0];
}
function getTr(id) {
  var tid = id||state.transport;
  for (var i=0;i<TRANSPORTS.length;i++) if (TRANSPORTS[i].id===tid) return TRANSPORTS[i];
  return TRANSPORTS[0];
}
function getDur(id) {
  var d = state.durability[id||state.transport];
  return (d === undefined || d === null) ? 100 : d;
}
function durColor(d) { return d>=75?'#6ddc6d':d>=50?'#FFD700':d>=25?'#ff9944':'#f44336'; }
function delivTime(tr) {
  var d=getDur(tr.id);
  var m=d>=75?1:d>=50?1.2:d>=25?1.5:2;
  return Math.round(tr.time*m);
}

// ── Цены ─────────────────────────────────────────────
function initPrices() {
  for (var n in BASE_PRICES) {
    if (!marketPrices[n]) marketPrices[n]={cur:BASE_PRICES[n],prev:BASE_PRICES[n],trend:0};
  }
}
function updatePrices() {
  for (var n in BASE_PRICES) {
    var p=marketPrices[n], base=BASE_PRICES[n];
    var chg=(Math.random()-0.48)*0.3;
    var nv=Math.max(base*0.3,Math.min(base*3,p.cur*(1+chg)));
    p.prev=p.cur; p.cur=Math.round(nv*100)/100;
    p.trend=p.cur>p.prev?1:p.cur<p.prev?-1:0;
  }
  lastPriceUpdate=Date.now();
  if (currentTab==='market') renderMarket();
}

// ── Сохранение ────────────────────────────────────────
// ── Версия сохранения ─────────────────────────────────
// Меняй SAVE_VERSION когда структура данных несовместима.
// Добавляй миграцию в migrate() чтобы не терять прогресс игроков.
var SAVE_VERSION = 1;
var SAVE_KEY = 'ff_save';
var dryPacks = {};

function migrate(s) {
  var v = s.version || 0;

  // Миграция с версии 0 (старые ключи ff3/ff4/ff5) → версия 1
  if (v < 1) {
    // Подтягиваем старые сохранения из ff5/ff4/ff3
    if (!s.coins && !s.caught) {
      var old = JSON.parse(localStorage.getItem('ff5') || localStorage.getItem('ff4') || localStorage.getItem('ff3') || 'null');
      if (old) {
        s.coins  = old.coins  || 0;
        s.caught = old.caught || 0;
        s.loc    = old.loc    || 'pond';
        s.ulocs  = old.ulocs  || ['pond'];
        s.ufish  = old.ufish  || {pond:['Карась']};
        s.cfish  = old.cfish  || {};
        s.live   = old.live   || [];
        s.transport  = old.transport  || 'bike';
        s.delivery   = old.delivery   || null;
        s.utrans     = old.utrans     || ['bike'];
        s.dur        = old.dur        || {bike:100,moped:100,car:100,truck:100};
        s.dailyDay   = old.dailyDay   || 0;
        s.dailyLast  = old.dailyLast  || 0;
        s.lastSeen   = old.lastSeen   || Date.now();
        s.upg        = old.upg        || {};
        s.prices     = old.prices     || {};
        s.priceTs    = old.priceTs    || 0;
        // Удаляем старые ключи
        localStorage.removeItem('ff5');
        localStorage.removeItem('ff4');
        localStorage.removeItem('ff3');
      }
    }
    s.version = 1;
  }

  // Сюда добавляй будущие миграции:
  // if (v < 2) { s.newField = defaultValue; s.version = 2; }
  if (v < 2) {
    s.salt      = s.salt      || 0;
    s.saltOrder = s.saltOrder || 0;
    s.salting   = s.salting   || [];
    s.quests    = s.quests    || [];
    s.questsDate= s.questsDate|| 0;
    s.questProgress = s.questProgress || {};
    s.version = 2;
  }
  // if (v < 3) { ... s.version = 3; }

  return s;
}

function save() {
  try {
    var upg={};
    for (var i=0;i<UPGRADES.length;i++) upg[UPGRADES[i].id]=UPGRADES[i].bought;
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      version: SAVE_VERSION,
      coins:state.coins, caught:state.caught,
      loc:state.currentLoc, ulocs:state.unlockedLocs,
      ufish:state.unlockedFish, cfish:state.caughtFish, live:state.liveFish,
      transport:state.transport, delivery:state.delivery,
      utrans:state.unlockedTransports, dur:state.durability,
      dailyDay:state.dailyDay, dailyLast:state.dailyLastClaim,
      lastSeen:Date.now(), upg:upg, prices:marketPrices, priceTs:lastPriceUpdate,
      drying:state.drying, driedFish:state.driedFish, boosts:state.boosts,
      quests:state.quests, questsDate:state.questsDate, questProgress:state.questProgress,
      salt:state.salt, saltOrder:state.saltOrder, salting:state.salting
    }));
  } catch(e){}
}

function load() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    var s = JSON.parse(raw || 'null') || {version:0};
    s = migrate(s);
    if (!s.coins && !s.caught && !s.ulocs) return; // нет данных
    state.coins  = s.coins  || 0;
    state.caught = s.caught || 0;
    state.currentLoc        = s.loc   || 'pond';
    state.unlockedLocs      = s.ulocs || ['pond'];
    state.unlockedFish      = s.ufish || {pond:['Карась']};
    state.caughtFish        = s.cfish || {};
    state.liveFish          = s.live  || [];
    state.transport         = s.transport || 'bike';
    state.delivery          = s.delivery  || null;
    state.unlockedTransports= s.utrans    || ['bike'];
    state.durability        = s.dur || {bike:100,moped:100,car:100,truck:100};
    state.dailyDay          = s.dailyDay  || 0;
    state.dailyLastClaim    = s.dailyLast || 0;
    state.lastSeen          = s.lastSeen  || Date.now();
    state.drying            = s.drying    || [];
    state.driedFish         = s.driedFish || [];
    state.boosts            = s.boosts    || {doubleTap:0,turboDlv:false,luckyRod:0,autoRepair:false};
    state.quests            = s.quests       || [];
    state.questsDate        = s.questsDate   || 0;
    state.questProgress     = s.questProgress|| {};
    state.salt              = s.salt         || 0;
    state.saltOrder         = s.saltOrder    || 0;
    state.salting           = s.salting      || [];
    if (!Array.isArray(state.salting)) state.salting = [];
    for (var i=0;i<UPGRADES.length;i++) { if(s.upg&&s.upg[UPGRADES[i].id]) UPGRADES[i].bought=s.upg[UPGRADES[i].id]; }
    for (var j=0;j<LOCATIONS.length;j++) { if(state.unlockedLocs.indexOf(LOCATIONS[j].id)>=0) LOCATIONS[j].unlocked=true; }
    if (s.prices)  marketPrices    = s.prices;
    if (s.priceTs) lastPriceUpdate = s.priceTs;
    // Сохраняем мигрированные данные сразу
    save();
  } catch(e){}
}

// ── Офлайн ────────────────────────────────────────────
function processOffline() {
  var now=Date.now(), last=state.lastSeen||now;
  if (now-last<5000) return;
  if (state.delivery && now>=state.delivery.endsAt) {
    state.coins=Math.round((state.coins+state.delivery.earnings)*100)/100;
    var saltArrived=state.delivery.saltOrder||0;
    if (saltArrived>0) state.salt=(state.salt||0)+saltArrived;
    showNotif('💰 Доставка прибыла! +🪙'+fmt(state.delivery.earnings)+(saltArrived>0?' · 🧂+'+saltArrived:''));
    state.delivery=null;
  }
  // Готовые слоты сушки — НЕ собираем автоматически, просто помечаем
  for (var d=0;d<state.drying.length;d++) {
    if (now>=state.drying[d].endsAt) state.drying[d].notified=true;
  }
  // Убираем просроченную сушёную рыбу (6ч с момента endsAt)
  state.driedFish=state.driedFish.filter(function(f){ return f.dieAt>now; });
  // Убираем погибшую свежую рыбу
  var dead=[], live=[];
  for (var i=0;i<state.liveFish.length;i++) {
    if (state.liveFish[i].dieAt<=now) dead.push(state.liveFish[i]);
    else live.push(state.liveFish[i]);
  }
  if (dead.length) { state.liveFish=live; showNotif('💀 Пока тебя не было погибло '+dead.length+' рыб!',true); }
}

// ── Расчёты ───────────────────────────────────────────
function calcStats() {
  var tm=1,auto=0;
  for (var i=0;i<UPGRADES.length;i++) {
    var u=UPGRADES[i];
    if (u.id==='rod')   tm+=(Math.pow(2,u.bought)-1);
    if (u.id==='net')   auto+=2*u.bought;
    if (u.id==='boat')  auto+=3*u.bought;
    if (u.id==='sonar') auto+=0.5*u.bought;
  }
  var lm=getLoc().tapMult||1;
  state.tapPower=Math.round(0.1*tm*lm*10)/10;
  state.autoPerSec=Math.round(auto*10)/10;
}
function catchChance() {
  var rod=null;
  for (var i=0;i<UPGRADES.length;i++) if(UPGRADES[i].id==='rod') rod=UPGRADES[i];
  var base=Math.min(0.65,0.20+(rod?rod.bought:0)*0.09);
  var lucky=(state.boosts.luckyRod>Date.now())?1.5:1;
  return Math.min(0.95, Math.round(base*scareFactor*lucky*100)/100);
}
function updateScare() {
  var now=Date.now(), ntimes=[];
  for (var i=0;i<tapTimes.length;i++) if(now-tapTimes[i]<1000) ntimes.push(tapTimes[i]);
  tapTimes=ntimes;
  var tps=tapTimes.length;
  if (tps<=3) scareFactor=Math.min(1.0,scareFactor+0.05);
  else if (tps<=MAX_TPS) scareFactor=Math.max(0.5,scareFactor-0.03);
  else scareFactor=Math.max(0.1,scareFactor-0.15);
}
function unlockFish() {
  var loc=state.currentLoc;
  if (!state.unlockedFish[loc]) state.unlockedFish[loc]=[];
  var fish=FISH[loc]||[];
  for (var i=0;i<fish.length;i++) {
    if (state.unlockedFish[loc].indexOf(fish[i].name)<0 && state.coins>=fish[i].need)
      state.unlockedFish[loc].push(fish[i].name);
  }
}
function randFish() {
  var loc=state.currentLoc;
  var all=FISH[loc]||[];
  var pool=[];
  for (var i=0;i<all.length;i++) if((state.unlockedFish[loc]||[]).indexOf(all[i].name)>=0) pool.push(all[i]);
  if (!pool.length) return all[0]||{emoji:'🐟',name:'Рыба',life:1};
  var tot=0; for (var j=0;j<pool.length;j++) tot+=pool[j].rate;
  var r=Math.random()*tot;
  for (var m=0;m<pool.length;m++) { r-=pool[m].rate; if(r<=0) return pool[m]; }
  return pool[0];
}
function calcEarnings(count) {
  var fish=state.liveFish.slice(0,count), total=0;
  for (var i=0;i<fish.length;i++) {
    var mp=marketPrices[fish[i].name]||{cur:BASE_PRICES[fish[i].name]||1};
    total+=mp.cur;
  }
  return Math.round(total*100)/100;
}

// ── Уведомления и анимации ────────────────────────────
function showNotif(msg,dead) {
  var el=document.createElement('div');
  el.className='notif'+(dead?' dead':'');
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); },3000);
}
function spawnAnim(x,y,emoji,label) {
  var ocean=document.getElementById('ocean');
  var el=document.createElement('div');
  el.className='tap-anim'; el.textContent=emoji;
  el.style.left=(x-13)+'px'; el.style.top=(y-13)+'px';
  ocean.appendChild(el);
  var plus=document.createElement('div');
  plus.className='plus-anim'; plus.textContent=label;
  plus.style.left=(x+8)+'px'; plus.style.top=(y-5)+'px';
  ocean.appendChild(plus);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); if(plus.parentNode) plus.parentNode.removeChild(plus); },900);
}
function spawnBubbles() {
  var ocean=document.getElementById('ocean');
  var old=ocean.querySelectorAll('.bubble');
  for (var i=0;i<old.length;i++) old[i].parentNode.removeChild(old[i]);
  var color=getLoc().bubble||'rgba(100,180,255,.15)';
  for (var j=0;j<5;j++) {
    var b=document.createElement('div');
    b.className='bubble';
    var sz=6+Math.random()*14;
    b.style.width=sz+'px'; b.style.height=sz+'px';
    b.style.left=(Math.random()*95)+'%'; b.style.bottom='0';
    b.style.background=color;
    b.style.animationDelay=(Math.random()*3)+'s';
    b.style.animationDuration=(2+Math.random()*2)+'s';
    ocean.appendChild(b);
  }
}
function moodEmoji() {
  if (scareFactor>=0.9) return '😊';
  if (scareFactor>=0.6) return '😐';
  if (scareFactor>=0.3) return '😨';
  return '😱';
}

function renderLocBar() {

// ── Вкладки ───────────────────────────────────────────
function renderUpgrades() {
  var html='';
  for (var i=0;i<UPGRADES.length;i++) {
    var u=UPGRADES[i], maxed=u.bought>=u.max;
    var cost=maxed?0:u.costs[u.bought], canBuy=!maxed&&state.coins>=cost;
    var extra=u.id==='rod'?' <span class="badge" style="background:#0a2a1a;color:#6ddc6d">'+Math.round(catchChance()*100)+'% улов</span>':'';
    html+='<div class="upg"><span class="ico">'+u.emoji+'</span>'
      +'<div class="inf"><div class="n">'+u.name+(u.bought>0?' <span class="badge">ур.'+u.bought+'</span>':'')+extra+'</div>'
      +'<div class="d">'+u.desc+'</div></div>'
      +'<button class="btn" onclick="buyUpgrade(\''+u.id+'\')" '+(canBuy?'':'disabled')+'>'+(maxed?'Макс ✓':'🪙 '+cost)+'</button></div>';

}
function renderAquarium() {
  var loc=state.currentLoc, li=getLoc();
  var fish=FISH[loc]||[], ul=state.unlockedFish[loc]||[];
  var pool=[]; for (var i=0;i<fish.length;i++) if(ul.indexOf(fish[i].name)>=0) pool.push(fish[i]);
  var tot=0; for (var j=0;j<pool.length;j++) tot+=pool[j].rate;
  var html='<div class="card" style="font-size:12px;color:#90caf9">'+li.emoji+' <b style="color:#fff">'+li.name+'</b> — рыбы локации</div>';
  for (var m=0;m<fish.length;m++) {
    var f=fish[m], isUl=ul.indexOf(f.name)>=0;
    if (!isUl) { html+='<div class="fish-item locked-item"><span class="ico">🔒</span><div class="inf"><div style="font-size:13px;font-weight:600;color:#fff">???</div><div style="font-size:11px;color:#666">'+(f.need>0?'Нужно '+fmt(f.need)+' монет':'Открывается на локации')+'</div></div></div>'; continue; }
    var pct=tot>0?Math.round(f.rate/tot*100):0;
    var alive=0; for (var n=0;n<state.liveFish.length;n++) if(state.liveFish[n].name===f.name) alive++;
    html+='<div class="fish-item"><span class="ico">'+f.emoji+'</span><div class="inf">'
      +'<div style="font-size:13px;font-weight:600;color:#fff">'+f.name
      +' <span class="badge">'+pct+'% шанс</span>'
      +(alive>0?' <span class="badge" style="background:#0a2a0a;color:#6ddc6d">🐠 '+alive+'</span>':' <span class="badge" style="background:#2a0a0a;color:#888">нет</span>')
      +'</div><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+li.border+'"></div></div>'
      +'</div></div>';
  }
  document.getElementById('content').innerHTML=html;
}

    else trBtns+='<button class="btn '+(canBuy?'btn-gold':'')+'" onclick="buyTransport(\''+t.id+'\')" '+(canBuy?'':'disabled')+'>'+t.emoji+' 🪙'+fmt(t.cost)+'</button>';

    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">'+trBtns+'</div>'
    +'<div style="font-size:11px;color:#90caf9;margin-bottom:8px">'+tr.emoji+' '+tr.name+' · '+tr.capacity+' рыб · '+fmtTime(dt)+'</div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<span style="font-size:11px;color:'+durColor(dur)+'">🔧 '+(broken?'Сломан!':dur+'%')+'</span>'
    +'<div style="flex:1;background:#1a1a2e;border-radius:4px;height:6px"><div style="background:'+durColor(dur)+';height:6px;border-radius:4px;width:'+dur+'%"></div></div>'
    +(dur<100?'<button class="btn '+(state.coins>=tr.repairCost?'btn-gold':'')+'" onclick="repairTr(\''+tr.id+'\')" '+(state.coins>=tr.repairCost?'':'disabled')+' style="font-size:10px;padding:4px 8px">🔧 🪙'+fmt(tr.repairCost)+'</button>':'')

    var selPool=isDried?driedGrouped:grouped;
    var selCnt=sel&&selPool[sel]?Math.min(selPool[sel],tr.capacity):0;

    }

function startSalting(name) {
  var grouped={};
  for (var i=0;i<state.liveFish.length;i++) { var n=state.liveFish[i].name; grouped[n]=(grouped[n]||0)+1; }
  var packs=dryPacks[name]||1, needed=packs*10;
  if ((grouped[name]||0)<needed) { showNotif('Нужно '+needed+' рыб!'); return; }
  if (state.salt<packs) { showNotif('🧂 Не хватает соли! Нужно '+packs+', есть '+state.salt); return; }
  var def=null; for (var k=0;k<ALL_FISH.length;k++) if(ALL_FISH[k].name===name) def=ALL_FISH[k];
  // Убираем рыбу со склада и списываем соль
  var taken=0, rest=[];
  for (var j=0;j<state.liveFish.length;j++) {
    if (state.liveFish[j].name===name && taken<needed) taken++;
    else rest.push(state.liveFish[j]);
  }
  state.liveFish=rest;
  state.salt-=packs;
  // Добавляем слот засолки (30 мин)
  state.salting.push({name:name,emoji:def?def.emoji:'🐟',packets:packs,startedAt:Date.now(),endsAt:Date.now()+1800000});
  dryPacks[name]=1;
  showNotif('🧂 '+packs+' пак. '+name+' отправлено на засолку!');
  updateUI(); save();
  if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

function startDryingFromSalt(idx) {
  var slot=state.salting[idx];
  if (!slot||Date.now()<slot.endsAt) return;
  var dtime=DRY_TIME[slot.name]||3600;
  state.drying.push({name:slot.name,emoji:slot.emoji,packets:slot.packets,startedAt:Date.now(),endsAt:Date.now()+dtime*1000});
  state.salting.splice(idx,1);
  showNotif('🌡 '+slot.name+' отправлена на сушку!');
  updateUI(); save();
  if(tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

function changePacks(name, delta) {
  var grouped={};
  for (var i=0;i<state.liveFish.length;i++) { var n=state.liveFish[i].name; grouped[n]=(grouped[n]||0)+1; }
  var max = Math.floor((grouped[name]||0)/10);
  if (!dryPacks[name]) dryPacks[name]=1;
  dryPacks[name] = Math.max(1, Math.min(max, dryPacks[name]+delta));
  renderKitchen();
}

function startDrying(name) {
  var grouped={};
  for (var i=0;i<state.liveFish.length;i++) { var n=state.liveFish[i].name; grouped[n]=(grouped[n]||0)+1; }
  var packs = dryPacks[name]||1;
  var needed = packs*10;
  if ((grouped[name]||0) < needed) { showNotif('Нужно '+needed+' рыб!'); return; }
  var def=null; for (var k=0;k<ALL_FISH.length;k++) if(ALL_FISH[k].name===name) def=ALL_FISH[k];
  var dtime = DRY_TIME[name]||3600;
  // Убираем рыбу со склада
  var taken=0, rest=[];
  for (var j=0;j<state.liveFish.length;j++) {
    if (state.liveFish[j].name===name && taken<needed) { taken++; }
    else rest.push(state.liveFish[j]);
  }
  state.liveFish = rest;
  // Добавляем слот сушки с количеством пакетов
  state.drying.push({name:name, emoji:def?def.emoji:'🐟', packets:packs, startedAt:Date.now(), endsAt:Date.now()+dtime*1000});
  dryPacks[name] = 1;
  addQuestProgress('dry', packs);
  showNotif((def?def.emoji:'🐟')+' '+packs+' пак. '+name+' отправлено на сушку!');
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

function collectDried(idx) {
  var slot = state.drying[idx];
  if (!slot || Date.now()<slot.endsAt) return;
  var packs = slot.packets||1;
  for (var p=0;p<packs;p++) {
    state.driedFish.push({name:slot.name, emoji:slot.emoji, dieAt:slot.endsAt+21600000}); // 6 часов с момента окончания сушки
  }
  state.drying.splice(idx,1);
  showNotif('📦 '+packs+' пак. '+slot.emoji+' '+slot.name+' сушёной готово!');
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

function checkSalting() {
  var now=Date.now(), changed=false;
  for (var i=0;i<state.salting.length;i++) {
    if (now>=state.salting[i].endsAt && !state.salting[i].notified) {
      state.salting[i].notified=true;
      showNotif('🧂 '+state.salting[i].emoji+' '+state.salting[i].name+' засолена — зайди на кухню!');
      changed=true;
    }
  }
  if (changed) { save(); }
  if (currentTab==='kitchen') renderKitchen();
}
function checkDrying() {
  var now=Date.now();
  // НЕ собираем автоматически — только уведомляем что готово
  for (var i=0;i<state.drying.length;i++) {
    var slot=state.drying[i];
    if (now>=slot.endsAt && !slot.notified) {
      slot.notified=true;
      showNotif('📦 '+slot.emoji+' '+slot.name+' сушёная готова — зайди на кухню!');
      save();
    }
  }
  // Проверяем истёкшие пакеты на складе
  var deadDried=[], liveDried=[];
  for (var j=0;j<state.driedFish.length;j++) {
    if (state.driedFish[j].dieAt<=now) deadDried.push(state.driedFish[j]);
    else liveDried.push(state.driedFish[j]);
  }
  if (deadDried.length) {
    state.driedFish=liveDried;
    showNotif('📦 Истёк срок годности: '+deadDried.length+' пакетов выброшено!',true);
    save();
  }
  if (currentTab==='kitchen') renderKitchen();
}

function getTodayDate() {
  var d=new Date(); return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
}
function generateQuests() {
  var today=getTodayDate();
  if (state.questsDate===today && state.quests.length===5) return;
  // Генерируем 5 случайных уникальных квестов
  var pool=QUEST_TEMPLATES.slice();
  var picked=[];
  // Перемешиваем с сидом от даты
  var seed=today;
  function rnd() { seed=(seed*1664525+1013904223)&0xffffffff; return Math.abs(seed)/0x80000000; }
  pool.sort(function(){ return rnd()-0.5; });
  for (var i=0;i<5&&i<pool.length;i++) picked.push(pool[i].id);
  state.quests=picked;
  state.questsDate=today;
  // Сбрасываем прогресс только для новых квестов
  var newProgress={};
  for (var j=0;j<picked.length;j++) newProgress[picked[j]]=state.questProgress[picked[j]]||0;
  state.questProgress=newProgress;
  save();
}
function getQuest(id) {
  for (var i=0;i<QUEST_TEMPLATES.length;i++) if(QUEST_TEMPLATES[i].id===id) return QUEST_TEMPLATES[i];
  return null;
}
function addQuestProgress(type, amount) {
  generateQuests();
  var changed=false;
  var allDoneBefore=true;
  for (var i=0;i<state.quests.length;i++) {
    var q=getQuest(state.quests[i]); if(!q) continue;
    if ((state.questProgress[q.id]||0) < q.goal) allDoneBefore=false;
  }
  if (allDoneBefore) return; // уже все выполнены

  for (var i=0;i<state.quests.length;i++) {
    var q=getQuest(state.quests[i]); if(!q) continue;
    if (q.type===type) {
      var prev=state.questProgress[q.id]||0;
      if (prev<q.goal) {
        state.questProgress[q.id]=Math.min(q.goal, prev+(amount||1));
        changed=true;
      }
    }
  }

  // Проверяем — все ли выполнены теперь
  if (changed) {
    var allDone=true;
    var totalReward=0;
    for (var j=0;j<state.quests.length;j++) {
      var qq=getQuest(state.quests[j]); if(!qq) continue;
      if ((state.questProgress[qq.id]||0)<qq.goal) { allDone=false; break; }
      totalReward+=qq.reward;
    }
    if (allDone) {
      state.coins=Math.round((state.coins+150)*100)/100;
      showNotif('🎉 Все квесты выполнены! +🪙150');
      if(tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }
    updateUI(); save();
  }
}

// Уникальный анонимный ID игрока (генерируется один раз)
function getPlayerId() {
  var id = localStorage.getItem('ff_player_id');
  if (!id) {
    id = 'p_' + Math.random().toString(36).substr(2,9) + '_' + Date.now().toString(36);
    localStorage.setItem('ff_player_id', id);
  }
  return id;
}

// Порядковый номер игрока (Рыбак #N)
function getPlayerNumber(playerId, callback) {
  if (!firebaseDB) { callback(0); return; }
  var numRef = firebaseDB.ref('player_numbers/' + playerId);
  numRef.once('value', function(snap) {
    if (snap.exists()) { callback(snap.val()); return; }
    // Новый игрок — получаем следующий номер
    var counterRef = firebaseDB.ref('player_counter');
    counterRef.transaction(function(cur) { return (cur||0)+1; }, function(err, committed, snap2) {
      if (committed) {
        var num = snap2.val();
        numRef.set(num);
        callback(num);
      } else callback(0);
    });
  });
}

  if (now - lastScoreUpload < 60000) return;
  lastScoreUpload = now;
  var pid = getPlayerId();
  getPlayerNumber(pid, function(num) {
    firebaseDB.ref('leaderboard/' + pid).set({
      num:    num,
      coins:  Math.floor(state.coins),
      caught: state.caught,
      loc:    state.currentLoc,
      ts:     now
    });
  });
}

    +'<b style="color:#fff">🏆 Таблица лидеров</b><br>Топ игроков по монетам. Все анонимны — отображаются как 🎣 Рыбак #N. Твой результат обновляется автоматически раз в минуту.<br><br>'
    +'<b style="color:#fff">⬆️ Улучшения</b><br>🎣 Удочка — шанс и монеты · 🕸 Сеть — авто/сек · ⛵ Лодка — авто/сек · 📡 Сонар — авто/сек<br><br>'
    +'<b style="color:#fff">🗺 Локации</b><br>Открывай новые локации — множитель монет и новые рыбы.</div></div>'
    +'<div class="card"><div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:8px">📊 Статистика</div>'
    +'<div style="font-size:12px;color:#90caf9;line-height:2">'
    +'Монет: '+fmt(state.coins)+'<br>Живых рыб: '+state.liveFish.length+'<br>За тап: '+state.tapPower.toFixed(1)+'<br>Авто/сек: '+state.autoPerSec+'<br>Локация: '+li.emoji+' '+li.name+'<br>Настроение: '+mood+'</div></div>'
    +'<div class="card" style="background:#3d0f0f"><div style="font-size:14px;font-weight:600;color:#ff6b6b;margin-bottom:6px">Сброс прогресса</div>'
    +'<div style="font-size:12px;color:#ff9999;margin-bottom:12px">Весь прогресс будет удалён безвозвратно</div>'
    +'<button class="btn btn-red btn-full" onclick="resetGame()">🗑 Сбросить прогресс</button></div>';
}

// ── Действия ──────────────────────────────────────────
function tapOcean(e) {
  e.preventDefault();
  var now=Date.now();
  if (now-lastTapTime<200) return;
  lastTapTime=now; tapTimes.push(now); updateScare();
  var touch=e.touches&&e.touches[0]?e.touches[0]:e;
  var rect=document.getElementById('ocean').getBoundingClientRect();
  var x=(touch.clientX||touch.pageX)-rect.left, y=(touch.clientY||touch.pageY)-rect.top;
  if (!tapped) { document.getElementById('hint').style.opacity='0'; tapped=true; }
  if (scareFactor<0.5) spawnAnim(x,y,'🐟','😨 Напугана!');
  if (Math.random()>catchChance()) { spawnAnim(x,y,'💨','Мимо!'); if(currentTab==='upgrades') renderUpgrades(); return; }
  var f=randFish();
  var boostMult=(state.boosts.doubleTap>Date.now())?2:1;
  var earned=Math.round(state.tapPower*boostMult*10)/10;
  state.coins=Math.round((state.coins+earned)*100)/100;
  state.caught++;
  state.caughtFish[f.name]=(state.caughtFish[f.name]||0)+1;
  state.liveFish.push({name:f.name,emoji:f.emoji,dieAt:Date.now()+f.life*3600000});
  unlockFish();
  // Квест: улов
  var isRare = (FISH[state.currentLoc]||[]).indexOf(f) > 0;
  addQuestProgress('catch', 1);
  if (isRare) addQuestProgress('rare', 1);
  spawnAnim(x,y,f.emoji,'+'+earned.toFixed(1));
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}
function buyUpgrade(id) {
  var u=null; for (var i=0;i<UPGRADES.length;i++) if(UPGRADES[i].id===id) u=UPGRADES[i];
  if (!u||u.bought>=u.max) return;
  var cost=u.costs[u.bought]; if (state.coins<cost) return;
  state.coins=Math.round((state.coins-cost)*100)/100; u.bought++;
  calcStats(); unlockFish(); updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}
function changeSaltOrder(delta) {
  var tr=getTr();
  var sel=state.selectedFish;
  var grouped={};
  for (var i=0;i<state.liveFish.length;i++) { var n=state.liveFish[i].name; grouped[n]=(grouped[n]||0)+1; }
  var driedGrouped={};
  for (var j=0;j<state.driedFish.length;j++) { var dn=state.driedFish[j].name; driedGrouped[dn]=(driedGrouped[dn]||0)+1; }
  var selPool=state.selectedDried?driedGrouped:grouped;
  var selCnt=sel&&selPool[sel]?Math.min(selPool[sel],tr.capacity):0;
  var maxSalt=tr.capacity-selCnt;
  state.saltOrder=Math.max(0,Math.min(maxSalt,(state.saltOrder||0)+delta));
  renderMarket();
}
function selectFish(name, dried) {
  if (state.selectedFish===name && !!state.selectedDried===!!dried) {
    state.selectedFish=null; state.selectedDried=false;
  } else {
    state.selectedFish=name; state.selectedDried=!!dried;
  }
  renderMarket();
}
function sendDelivery() {
  if (state.delivery) return;
  var tr=getTr(), dur=getDur(tr.id);
  if (dur<=0) { showNotif('🔧 Сломан! Почини транспорт.'); return; }
  var sel=state.selectedFish, isDried=!!state.selectedDried;
  if (!sel) { showNotif('Выбери что отправить!'); return; }
  var toSend=[], rest=[], earn=0;
  if (isDried) {
    // Отправляем сушёные пакеты
    var taken=0;
    for (var i=0;i<state.driedFish.length;i++) {
      if (state.driedFish[i].name===sel && taken<tr.capacity) {
        var mp=marketPrices[sel]||{cur:BASE_PRICES[sel]||1};
        earn+=mp.cur; toSend.push(state.driedFish[i]); taken++;
      } else rest.push(state.driedFish[i]);
    }
    if (!toSend.length) { showNotif('Нет сушёной рыбы!'); return; }
    state.driedFish=rest;
  } else {
    // Отправляем свежую
    var taken2=0;
    for (var j=0;j<state.liveFish.length;j++) {
      if (state.liveFish[j].name===sel && taken2<tr.capacity) {
        var mp2=marketPrices[sel]||{cur:BASE_PRICES[sel]||1};
        earn+=mp2.cur; toSend.push(state.liveFish[j]); taken2++;
      } else rest.push(state.liveFish[j]);
    }
    if (!toSend.length) { showNotif('Нет рыбы этого вида!'); return; }
    state.liveFish=rest;
  }
  earn=Math.round(earn*100)/100;
  var secs=delivTime(tr);
  if (state.boosts.turboDlv) { secs=1; state.boosts.turboDlv=false; showNotif('🚀 Турбо доставка активирована!'); }
  var saltOrder=state.saltOrder||0;
  var saltPrice=SALT_PRICE[state.currentLoc]||1;
  var saltCost=saltOrder*saltPrice;
  if (saltOrder>0 && state.coins<saltCost) { showNotif('Не хватает монет на соль!'); return; }
  if (saltOrder>0) state.coins=Math.round((state.coins-saltCost)*100)/100;
  state.durability[tr.id]=Math.max(0,dur-10);
  state.delivery={count:toSend.length,earnings:earn,startedAt:Date.now(),endsAt:Date.now()+secs*1000,saltOrder:saltOrder};
  state.saltOrder=0;
  state.selectedFish=null; state.selectedDried=false;
  addQuestProgress('deliver', 1);
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}
function repairTr(id) {
  var tr=getTr(id); if (!tr) return;
  if (state.coins<tr.repairCost) { showNotif('Не хватает монет!'); return; }
  state.coins=Math.round((state.coins-tr.repairCost)*100)/100;
  state.durability[id]=100;
  showNotif('🔧 '+tr.emoji+' '+tr.name+' отремонтирован!');
  addQuestProgress('repair', 1);
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}
function selectTransport(id) {
  if (state.unlockedTransports.indexOf(id)<0) return;
  state.transport=id; save(); renderMarket();
}
function buyTransport(id) {
  var tr=getTr(id);
  if (!tr||state.coins<tr.cost||state.unlockedTransports.indexOf(id)>=0) return;
  state.coins=Math.round((state.coins-tr.cost)*100)/100;
  state.unlockedTransports.push(id); state.transport=id;
  showNotif('🎉 Куплен '+tr.emoji+' '+tr.name+'!');
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}
function switchLoc(id) {
  var loc=getLoc(id); if (!loc||!loc.unlocked) return;
  state.currentLoc=id;
  var ocean=document.getElementById('ocean');
  ocean.style.background=loc.bg; ocean.style.borderBottomColor=loc.border;
  document.getElementById('loc-label').textContent=loc.emoji+' '+loc.name;
  spawnBubbles(); calcStats(); renderLocBar(); updateUI(); save();
}
function unlockLoc(id) {
  var loc=getLoc(id); if (!loc||loc.unlocked||state.coins<loc.cost) return;
  state.coins=Math.round((state.coins-loc.cost)*100)/100;
  loc.unlocked=true; state.unlockedLocs.push(id);
  if (!state.unlockedFish[id]) state.unlockedFish[id]=[FISH[id]&&FISH[id][0]?FISH[id][0].name:''];
  renderLocBar(); updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}
function getDailyStatus() {
  var now=Date.now(), last=state.dailyLastClaim, day=state.dailyDay;
  if (!last) return {canClaim:true,day:0,missed:false};
  var h=(now-last)/3600000;
  if (h>=48) return {canClaim:true,day:0,missed:true};
  if (h>=24) return {canClaim:true,day:day,missed:false};
  return {canClaim:false,day:day,missed:false,nextIn:Math.ceil(24-h)};
}
function claimDaily() {
  var st=getDailyStatus(); if (!st.canClaim) return;
  if (st.missed) state.dailyDay=0;
  var reward=DAILY[state.dailyDay];
  state.coins=Math.round((state.coins+reward)*100)/100;
  state.dailyLastClaim=Date.now();
  state.dailyDay=state.dailyDay>=6?0:state.dailyDay+1;
  showNotif('🎁 День '+state.dailyDay+' — получено 🪙'+fmt(reward)+'!');
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}
function resetGame() {
  if (!confirm('Сбросить весь прогресс?')) return;
  if (!confirm('Вы уверены? Нельзя отменить!')) return;
  localStorage.removeItem(SAVE_KEY);
  localStorage.removeItem('ff5');
  localStorage.removeItem('ff4');
  localStorage.removeItem('ff3');
  state={coins:0,caught:0,tapPower:0.1,autoPerSec:0,currentLoc:'pond',unlockedLocs:['pond'],unlockedFish:{pond:['Карась']},caughtFish:{},liveFish:[],transport:'bike',delivery:null,unlockedTransports:['bike'],durability:{bike:100,moped:100,car:100,truck:100},dailyDay:0,dailyLastClaim:0,lastSeen:0,selectedFish:null,selectedDried:false,drying:[],driedFish:[],boosts:{doubleTap:0,turboDlv:false,luckyRod:0,autoRepair:false},quests:[],questsDate:0,questProgress:{},salt:0,saltOrder:0,salting:[]};
  for (var i=0;i<UPGRADES.length;i++) UPGRADES[i].bought=0;
  for (var j=0;j<LOCATIONS.length;j++) LOCATIONS[j].unlocked=j===0;
  marketPrices={}; initPrices(); lastPriceUpdate=Date.now();
  tapped=false; scareFactor=1.0;
  document.getElementById('hint').style.opacity='1';
  calcStats(); switchLoc('pond'); showTab('upgrades');
}

// ── Тик ──────────────────────────────────────────────
function checkDeaths() {
  var now=Date.now(), dead=[], live=[];
  for (var i=0;i<state.liveFish.length;i++) {
    if (state.liveFish[i].dieAt<=now) dead.push(state.liveFish[i]);
    else live.push(state.liveFish[i]);
  }
  if (dead.length) {
    state.liveFish=live;
    for (var j=0;j<dead.length;j++) showNotif('💀 '+dead[j].emoji+' '+dead[j].name+' погибла!',true);
    save();
  }
}
function checkDelivery() {
  if (!state.delivery) return;
  if (Date.now()>=state.delivery.endsAt) {
    state.coins=Math.round((state.coins+state.delivery.earnings)*100)/100;
    addQuestProgress('earn', state.delivery.earnings);
    var saltArrived=state.delivery.saltOrder||0;
    var msg='💰 Доставка прибыла! +🪙'+fmt(state.delivery.earnings);
    if (saltArrived>0) {
      state.salt=(state.salt||0)+saltArrived;
      msg+=' · 🧂+'+saltArrived+' соли';
    }
    showNotif(msg);
    state.delivery=null; updateUI(); save();
    if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  } else if (currentTab==='market') renderMarket();
}
function tick() {
  var now=Date.now(), dt=(now-lastAuto)/1000; lastAuto=now;
  if (state.autoPerSec>0) {
    var earned=Math.round(state.autoPerSec*dt*state.tapPower*10)/100;
    if (earned>0) {
      state.coins=Math.round((state.coins+earned)*100)/100;
      state.caught+=Math.ceil(earned);
      var af=randFish(); state.caughtFish[af.name]=(state.caughtFish[af.name]||0)+Math.ceil(earned);
      unlockFish(); updateUI(); save();
    }
  }
  checkDeaths(); checkDelivery(); checkDrying(); checkSalting();
  uploadScore();
  if (Date.now()-lastPriceUpdate>=PRICE_INTERVAL) updatePrices();
  var te=document.getElementById('mkt-timer');
  if (te) te.textContent=Math.max(0,Math.ceil((lastPriceUpdate+PRICE_INTERVAL-Date.now())/1000))+'с';
  setTimeout(tick,500);
}

// ── Запуск ────────────────────────────────────────────
load();
processOffline();
initFirebase();
initPrices();
if (!lastPriceUpdate) { updatePrices(); lastPriceUpdate=Date.now(); }
calcStats();
var il=getLoc();
var oc=document.getElementById('ocean');
oc.style.background=il.bg; oc.style.borderBottomColor=il.border;
document.getElementById('loc-label').textContent=il.emoji+' '+il.name;
for (var bi=0;bi<LOCATIONS.length;bi++) if(state.unlockedLocs.indexOf(LOCATIONS[bi].id)>=0) LOCATIONS[bi].unlocked=true;
spawnBubbles(); renderLocBar(); updateUI(); setTimeout(tick,500);
</script>
