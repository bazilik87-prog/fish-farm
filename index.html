}

}

function migrate(s) {

    if (!s.coins && !s.caught) {

      if (old) {

        s.dailyLast  = old.dailyLast  || 0;
        s.lastSeen   = old.lastSeen   || Date.now();
        s.upg        = old.upg        || {};

        s.priceTs    = old.priceTs    || 0;
        // –£–і–∞–ї—П–µ–Љ —Б—В–∞—А—Л–µ –Ї–ї—О—З–Є
        localStorage.removeItem('ff5');
        localStorage.removeItem('ff4');
        localStorage.removeItem('ff3');
      }
    }
    s.version = 1;
  }

  // –°—О–і–∞ –і–Њ–±–∞–≤–ї—П–є –±—Г–і—Г—Й–Є–µ –Љ–Є–≥—А–∞—Ж–Є–Є:

    s.quests    = s.quests    || [];
    s.questsDate= s.questsDate|| 0;
    s.questProgress = s.questProgress || {};
    s.version = 2;
  }
  // if (v < 3) { ... s.version = 3; }

  return s;
}

function processOffline() {
  var now=Date.now(), last=state.lastSeen||now;
  var elapsed=now-last;
  if (elapsed<5000) return;
  if (state.delivery && now>=state.delivery.endsAt) {
    state.coins=Math.round((state.coins+state.delivery.earnings)*100)/100;
    state.totalEarned=Math.round((state.totalEarned+state.delivery.earnings)*100)/100;
    addQuestProgress('earn', state.delivery.earnings);
    var saltArrived=state.delivery.saltOrder||0;
    var knifeArrived=state.delivery.knifeOrder||0;
    if (saltArrived>0) { state.salt=(state.salt||0)+saltArrived; addQuestProgress('buysalt', saltArrived); }
    if (knifeArrived>0) { state.knife=(state.knife||0)+knifeArrived; addQuestProgress('buyknife', knifeArrived); }
    var offMsg='рЯТ∞ –Ф–Њ—Б—В–∞–≤–Ї–∞ –њ—А–Є–±—Л–ї–∞! +рЯ™Щ'+fmt(state.delivery.earnings);
    if (saltArrived>0) offMsg+=' ¬Ј рЯІВ+'+saltArrived;
    if (knifeArrived>0) offMsg+=' ¬Ј рЯФ™+'+knifeArrived;
    showNotif(offMsg);
    state.delivery=null;
  }
  if (state.delivery2 && now>=state.delivery2.endsAt) {
    state.coins=Math.round((state.coins+state.delivery2.earnings)*100)/100;
    state.totalEarned=Math.round((state.totalEarned+state.delivery2.earnings)*100)/100;
    addQuestProgress('earn', state.delivery2.earnings);
    showNotif('рЯІСвАНвЬИпЄП –Т–Њ–і–Є—В–µ–ї—М –≤–µ—А–љ—Г–ї—Б—П! +рЯ™Щ'+fmt(state.delivery2.earnings));
    state.delivery2=null;
  }
  // –Р–≤—В–Њ-–і–Њ—Е–Њ–і –Ј–∞ –≤—А–µ–Љ—П –Њ—Д–ї–∞–є–љ (—Б–µ—В—М/–ї–Њ–і–Ї–∞/—Б–Њ–љ–∞—А)
  if (state.autoPerSec > 0) {
    var autoEarned = Math.round(state.autoPerSec * elapsed / 1000 / 60 * 100) / 100;
    if (autoEarned > 0) {
      state.coins = Math.round((state.coins + autoEarned) * 100) / 100;
      state.totalEarned = Math.round((state.totalEarned + autoEarned) * 100) / 100;
      showNotif('рЯ™Щ –Р–≤—В–Њ-–і–Њ—Е–Њ–і –Ј–∞ –Њ—Д–ї–∞–є–љ: +' + fmt(autoEarned));
    }
  }
  for (var d=0;d<state.drying.length;d++) {
    if (now>=state.drying[d].endsAt) state.drying[d].notified=true;
  }
  for (var c=0;c<(state.cutting||[]).length;c++) {
    if (now>=state.cutting[c].endsAt) state.cutting[c].notified=true;
  }
  // –£–±–Є—А–∞–µ–Љ –њ—А–Њ—Б—А–Њ—З–µ–љ–љ—Г—О —Б—Г—И—С–љ—Г—О —А—Л–±—Г (6—З —Б –Љ–Њ–Љ–µ–љ—В–∞ endsAt)
  state.driedFish=state.driedFish.filter(function(f){ return f.dieAt>now; });
  // –£–±–Є—А–∞–µ–Љ –њ–Њ–≥–Є–±—И—Г—О —Б–≤–µ–ґ—Г—О —А—Л–±—Г
  var dead=[], live=[];
  for (var i=0;i<state.liveFish.length;i++) {
    if (state.liveFish[i].dieAt<=now) dead.push(state.liveFish[i]);
    else live.push(state.liveFish[i]);
  }
  if (dead.length) { state.liveFish=live; showNotif('рЯТА –Я–Њ–Ї–∞ —В–µ–±—П –љ–µ –±—Л–ї–Њ –њ–Њ–≥–Є–±–ї–Њ '+dead.length+' —А—Л–±!',true); }
}

function calcStats() {
  var tm=1, auto=0;
  var rodBought=0;
  for (var i=0;i<UPGRADES.length;i++) {
    var u=UPGRADES[i];
    if (u.id==='rod')   rodBought=u.bought;
    if (u.id==='net')   auto+=0.1*u.bought;
    if (u.id==='boat')  auto+=0.3*u.bought;
    if (u.id==='sonar') auto+=0.5*u.bought;
  }
  var lm=getLoc().tapMult||1;
  state.tapPower=Math.round(ROD_TAP[rodBought]*lm*10)/10;
  state.autoPerSec=Math.round(auto*10)/10;
}
function catchChance() {
  var rod=null;
  for (var i=0;i<UPGRADES.length;i++) if(UPGRADES[i].id==='rod') rod=UPGRADES[i];
  var base=Math.min(0.65,0.20+(rod?rod.bought:0)*0.09);
  var lucky=(state.boosts.luckyRod>Date.now())?1.5:1;
  // –§–Є–Ї—Б–Є—А–Њ–≤–∞–љ–љ—Л–µ –Љ–љ–Њ–ґ–Є—В–µ–ї–Є –њ–Њ –љ–∞—Б—В—А–Њ–µ–љ–Є—О
  var mult;
  if (scareFactor>=0.9)      mult=1.0;   // рЯШК —Б–њ–Њ–Ї–Њ–є–љ–∞—П
  else if (scareFactor>=0.6) mult=0.5;   // рЯШР –љ–∞—Б—В–Њ—А–Њ–ґ–µ–љ–∞ ~50%
  else if (scareFactor>=0.3) mult=0.17;  // рЯШ® –љ–∞–њ—Г–≥–∞–љ–∞ ~5% –Њ—В –±–∞–Ј—Л
  else                       mult=0.05;  // рЯШ± –≤ –њ–∞–љ–Є–Ї–µ ~1% –Њ—В –±–∞–Ј—Л
  return Math.min(0.95, Math.round(base*mult*lucky*100)/100);
}
function updateScare() {
  var now=Date.now(), ntimes=[];
  for (var i=0;i<tapTimes.length;i++) if(now-tapTimes[i]<1000) ntimes.push(tapTimes[i]);
  tapTimes=ntimes;
  var tps=tapTimes.length;
  if (tps<=3) scareFactor=Math.min(1.0,scareFactor+0.05);
  else if (tps<=MAX_TPS) scareFactor=Math.max(0.5,scareFactor-0.03);
  else scareFactor=Math.max(0.05,scareFactor-0.15);
}
function unlockFish() {
  var loc=state.currentLoc;
  if (!state.unlockedFish[loc]) state.unlockedFish[loc]=[];
  var fish=FISH[loc]||[];
  for (var i=0;i<fish.length;i++) {
    if (state.unlockedFish[loc].indexOf(fish[i].name)<0 && state.coins>=fish[i].need)
      state.unlockedFish[loc].push(fish[i].name);
  }
}
function randFish() {
  var loc=state.currentLoc;
  var all=FISH[loc]||[];
  var pool=[];
  for (var i=0;i<all.length;i++) if((state.unlockedFish[loc]||[]).indexOf(all[i].name)>=0) pool.push(all[i]);
  if (!pool.length) return all[0]||{emoji:'рЯРЯ',name:'–†—Л–±–∞',life:1};
  var tot=0; for (var j=0;j<pool.length;j++) tot+=pool[j].rate;
  var r=Math.random()*tot;
  for (var m=0;m<pool.length;m++) { r-=pool[m].rate; if(r<=0) return pool[m]; }
  return pool[0];
}
function calcEarnings(count) {
  var fish=state.liveFish.slice(0,count), total=0;
  for (var i=0;i<fish.length;i++) {
    var mp=marketPrices[fish[i].name]||{cur:BASE_PRICES[fish[i].name]||1};
    total+=mp.cur;
  }
  return Math.round(total*100)/100;
}

function bulkSell(type) {
  if (type==='dried') {
    var count=state.driedFish.length;
    if (!count) return;
    var earn=Math.round(count*0.03*100)/100;
    state.driedFish=[];
    state.coins=Math.round((state.coins+earn)*100)/100;
    addQuestProgress('earn', earn);
    showNotif('рЯТ∞ –Я—А–Њ–і–∞–љ–Њ '+count+' –њ–∞–Ї–µ—В–Њ–≤ ¬Ј +рЯ™Щ'+earn);
  } else if (type==='filet') {
    var countF=0;
    var restFilets=[];
    for (var i=0;i<(state.filets||[]).length;i++) {
      if (!state.filets[i].packingEndsAt) countF+=(state.filets[i].packets||1);
      else restFilets.push(state.filets[i]);
    }
    if (!countF) return;
    var earnF=Math.round(countF*0.02*100)/100;
    state.filets=restFilets;
    state.coins=Math.round((state.coins+earnF)*100)/100;
    addQuestProgress('earn', earnF);
    showNotif('рЯТ∞ –Я—А–Њ–і–∞–љ–Њ '+countF+' –њ–∞–Ї–µ—В–Њ–≤ —Д–Є–ї–µ ¬Ј +рЯ™Щ'+earnF);
  } else {
    var count2=state.liveFish.length;
    if (!count2) return;
    var earn2=Math.round(count2*0.01*100)/100;
    state.liveFish=[];
    state.coins=Math.round((state.coins+earn2)*100)/100;
    addQuestProgress('earn', earn2);
    addQuestProgress('bulk', count2);
    showNotif('рЯТ∞ –Я—А–Њ–і–∞–љ–Њ '+count2+' —А—Л–± ¬Ј +рЯ™Щ'+earn2);
  }
  updateUI(); save();
  if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

function startCutting(name) {
  var grouped={};
  for (var i=0;i<state.liveFish.length;i++) { var n=state.liveFish[i].name; grouped[n]=(grouped[n]||0)+1; }
  var packs=dryPacks[name]||1, needed=packs*10;
  if ((grouped[name]||0)<needed) { showNotif('–Э—Г–ґ–љ–Њ '+needed+' —А—Л–±!'); return; }
  if ((state.knife||0)<packs) { showNotif('рЯФ™ –Э–µ —Е–≤–∞—В–∞–µ—В –љ–Њ–ґ–µ–є! –Э—Г–ґ–љ–Њ '+packs+', –µ—Б—В—М '+(state.knife||0)); return; }
  var def=null; for (var k=0;k<ALL_FISH.length;k++) if(ALL_FISH[k].name===name) def=ALL_FISH[k];
  var taken=0, rest=[];
  for (var j=0;j<state.liveFish.length;j++) {
    if (state.liveFish[j].name===name && taken<needed) taken++;
    else rest.push(state.liveFish[j]);
  }
  state.liveFish=rest;
  state.knife-=packs;
  state.cutting.push({name:name,emoji:def?def.emoji:'рЯРЯ',packets:packs,startedAt:Date.now(),endsAt:Date.now()+7200000}); // 2 —З–∞—Б–∞
  addQuestProgress('filet', packs);
  dryPacks[name]=1;
  showNotif('рЯФ™ '+packs+' –њ–∞–Ї. '+name+' –Њ—В–њ—А–∞–≤–ї–µ–љ–Њ –љ–∞ —А–∞–Ј–і–µ–ї–Ї—Г!');
  updateUI(); save();
  if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

function startPacking(idx) {
  var slot=state.cutting[idx];
  if (!slot||Date.now()<slot.endsAt) return;
  // –Э–∞—З–Є–љ–∞–µ–Љ —Г–њ–∞–Ї–Њ–≤–Ї—Г (1 —З–∞—Б)
  var packTime = (DRY_TIME[slot.name] || 3600) * 1000;
  state.filets.push({name:slot.name,emoji:slot.emoji,packets:slot.packets,packingEndsAt:Date.now()+packTime});
  state.cutting.splice(idx,1);
  showNotif('рЯУ¶ '+slot.name+' –Њ—В–њ—А–∞–≤–ї–µ–љ–∞ –љ–∞ —Г–њ–∞–Ї–Њ–≤–Ї—Г вАФ 1 —З–∞—Б!');
  updateUI(); save();
}

function collectFilet(idx) {
  var slot=state.filets[idx];
  if (!slot||!slot.packingEndsAt||Date.now()<slot.packingEndsAt) return;

function getTodayDate() {
  var d=new Date(); return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
}
function generateQuests() {
  var today=getTodayDate();
  if (state.questsDate===today && state.quests.length===5) return;
  // –У–µ–љ–µ—А–Є—А—Г–µ–Љ 5 —Б–ї—Г—З–∞–є–љ—Л—Е —Г–љ–Є–Ї–∞–ї—М–љ—Л—Е –Ї–≤–µ—Б—В–Њ–≤
  var pool=QUEST_TEMPLATES.slice();
  var picked=[];
  // –Я–µ—А–µ–Љ–µ—И–Є–≤–∞–µ–Љ —Б —Б–Є–і–Њ–Љ –Њ—В –і–∞—В—Л
  var seed=today;
  function rnd() { seed=(seed*1664525+1013904223)&0xffffffff; return Math.abs(seed)/0x80000000; }
  pool.sort(function(){ return rnd()-0.5; });
  for (var i=0;i<5&&i<pool.length;i++) picked.push(pool[i].id);
  state.quests=picked;
  state.questsDate=today;
  // –°–±—А–∞—Б—Л–≤–∞–µ–Љ –≤–µ—Б—М –њ—А–Њ–≥—А–µ—Б—Б –љ–∞ –љ–Њ–≤—Л–є –і–µ–љ—М
  var newProgress={};
  for (var j=0;j<picked.length;j++) newProgress[picked[j]]=0;
  state.questProgress=newProgress;
  save();
}
function getQuest(id) {
  for (var i=0;i<QUEST_TEMPLATES.length;i++) if(QUEST_TEMPLATES[i].id===id) return QUEST_TEMPLATES[i];
  return null;
}
function addQuestProgress(type, amount) {
  generateQuests();
  var changed=false;
  var allDoneBefore=true;
  for (var i=0;i<state.quests.length;i++) {
    var q=getQuest(state.quests[i]); if(!q) continue;
    if ((state.questProgress[q.id]||0) < q.goal) allDoneBefore=false;
  }
  if (allDoneBefore) return; // —Г–ґ–µ –≤—Б–µ –≤—Л–њ–Њ–ї–љ–µ–љ—Л

  for (var i=0;i<state.quests.length;i++) {
    var q=getQuest(state.quests[i]); if(!q) continue;
    if (q.type===type) {
      var prev=state.questProgress[q.id]||0;
      if (prev<q.goal) {
        state.questProgress[q.id]=Math.min(q.goal, prev+(amount||1));
        changed=true;
      }
    }
  }

  // –Я—А–Њ–≤–µ—А—П–µ–Љ вАФ –≤—Б–µ –ї–Є –≤—Л–њ–Њ–ї–љ–µ–љ—Л —В–µ–њ–µ—А—М
  if (changed) {
    var allDone=true;
    for (var j=0;j<state.quests.length;j++) {
      var qq=getQuest(state.quests[j]); if(!qq) continue;
      if ((state.questProgress[qq.id]||0)<qq.goal) { allDone=false; break; }
    }
    if (allDone) {
      state.coins=Math.round((state.coins+300)*100)/100;
      state.totalEarned=Math.round((state.totalEarned+300)*100)/100;
      showNotif('рЯОЙ –Т—Б–µ –Ї–≤–µ—Б—В—Л –≤—Л–њ–Њ–ї–љ–µ–љ—Л! +рЯ™Щ300');
      if(tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }
    updateUI(); save();
  }
}

// –£–љ–Є–Ї–∞–ї—М–љ—Л–є –∞–љ–Њ–љ–Є–Љ–љ—Л–є ID –Є–≥—А–Њ–Ї–∞ (–≥–µ–љ–µ—А–Є—А—Г–µ—В—Б—П –Њ–і–Є–љ —А–∞–Ј)
function getPlayerId() {
  // –Ш—Б–њ–Њ–ї—М–Ј—Г–µ–Љ Telegram user ID –µ—Б–ї–Є –і–Њ—Б—В—Г–њ–µ–љ
  var tgUser = tg && tg.initDataUnsafe && tg.initDataUnsafe.user;
  if (tgUser && tgUser.id) return 'tg_' + tgUser.id;
  // Fallback вАФ —Б–ї—Г—З–∞–є–љ—Л–є ID –Є–Ј localStorage
  var id = localStorage.getItem('ff_player_id');
  if (!id) {
    id = 'p_' + Math.random().toString(36).substr(2,9) + '_' + Date.now().toString(36);
    localStorage.setItem('ff_player_id', id);
  }
  return id;
}

// –Я–Њ—А—П–і–Ї–Њ–≤—Л–є –љ–Њ–Љ–µ—А –Є–≥—А–Њ–Ї–∞ (–†—Л–±–∞–Ї #N)
function getPlayerNumber(playerId, callback) {
  if (!firebaseDB) { callback(0); return; }
  var numRef = firebaseDB.ref('player_numbers/' + playerId);
  numRef.once('value', function(snap) {
    if (snap.exists()) { callback(snap.val()); return; }
    // –Э–Њ–≤—Л–є –Є–≥—А–Њ–Ї вАФ –њ–Њ–ї—Г—З–∞–µ–Љ —Б–ї–µ–і—Г—О—Й–Є–є –љ–Њ–Љ–µ—А
    var counterRef = firebaseDB.ref('player_counter');
    counterRef.transaction(function(cur) { return (cur||0)+1; }, function(err, committed, snap2) {
      if (committed) {
        var num = snap2.val();
        numRef.set(num);
        callback(num);
      } else callback(0);
    });
  });
}

// –Ю—В–њ—А–∞–≤–ї—П–µ–Љ —Б—З—С—В –≤ Firebase (–љ–µ —З–∞—Й–µ —А–∞–Ј–∞ –≤ –Љ–Є–љ—Г—В—Г)

  var userId = tgUser ? tgUser.id : 0;

  var firstName = tgUser ? (tgUser.first_name || '') : '';

      ts:          now,

      username:    username,
      firstName:   firstName,
      playerName:  state.playerName || ''
    });
  });
}

  localStorage.removeItem('ff4');
  localStorage.removeItem('ff3');
  state={coins:0,caught:0,tapPower:0.1,autoPerSec:0,currentLoc:'pond',unlockedLocs:['pond'],unlockedFish:{pond:['–Ъ–∞—А–∞—Б—М']},caughtFish:{},liveFish:[],transport:'bike',delivery:null,delivery2:null,unlockedTransports:['bike'],durability:{bike:100,moped:100,car:100,truck:100},dailyDay:0,dailyLastClaim:0,lastSeen:0,selectedFish:null,selectedDried:false,drying:[],driedFish:[],boosts:{doubleTap:0,turboDry:false,luckyRod:0,turboSpeed:0},quests:[],questsDate:0,questProgress:{},salt:0,saltOrder:0,salting:[]};
  for (var i=0;i<UPGRADES.length;i++) UPGRADES[i].bought=0;
  for (var j=0;j<LOCATIONS.length;j++) LOCATIONS[j].unlocked=j===0;
  marketPrices={}; initPrices(); lastPriceUpdate=Date.now();
  tapped=false; scareFactor=1.0;
  document.getElementById('hint').style.opacity='1';
  calcStats(); switchLoc('pond'); showTab('upgrades');
}

// вФАвФА –Ґ–Є–Ї вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function checkDeaths() {
  var now=Date.now(), dead=[], live=[];
  for (var i=0;i<state.liveFish.length;i++) {
    if (state.liveFish[i].dieAt<=now) dead.push(state.liveFish[i]);
    else live.push(state.liveFish[i]);
  }
  if (dead.length) {
    state.liveFish=live;
    for (var j=0;j<dead.length;j++) showNotif('рЯТА '+dead[j].emoji+' '+dead[j].name+' –њ–Њ–≥–Є–±–ї–∞!',true);
    save();
  }
}
function checkDelivery() {
  if (state.delivery && Date.now()>=state.delivery.endsAt) {
    state.coins=Math.round((state.coins+state.delivery.earnings)*100)/100;
    state.totalEarned=Math.round((state.totalEarned+state.delivery.earnings)*100)/100;
    addQuestProgress('earn', state.delivery.earnings);
    var saltArrived=state.delivery.saltOrder||0;
    var knifeArrived=state.delivery.knifeOrder||0;
    var msg='рЯТ∞ –Ф–Њ—Б—В–∞–≤–Ї–∞ –њ—А–Є–±—Л–ї–∞! +рЯ™Щ'+fmt(state.delivery.earnings);
    if (saltArrived>0) { state.salt=(state.salt||0)+saltArrived; addQuestProgress('buysalt', saltArrived); msg+=' ¬Ј рЯІВ+'+saltArrived; }
    if (knifeArrived>0) { state.knife=(state.knife||0)+knifeArrived; addQuestProgress('buyknife', knifeArrived); msg+=' ¬Ј рЯФ™+'+knifeArrived; }
    showNotif(msg);
    state.delivery=null; updateUI(); save();
    if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  }
  if (state.delivery2 && Date.now()>=state.delivery2.endsAt) {
    state.coins=Math.round((state.coins+state.delivery2.earnings)*100)/100;
    state.totalEarned=Math.round((state.totalEarned+state.delivery2.earnings)*100)/100;
    addQuestProgress('earn', state.delivery2.earnings);
    showNotif('рЯІСвАНвЬИпЄП –Т–Њ–і–Є—В–µ–ї—М –≤–µ—А–љ—Г–ї—Б—П! +рЯ™Щ'+fmt(state.delivery2.earnings));
    state.delivery2=null; updateUI(); save();
    if (tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  }
  if (currentTab==='market') renderMarket();
}
function tick() {
  try {
    var now=Date.now(), dt=(now-lastAuto)/1000; lastAuto=now;
    if (state.autoPerSec>0 || state.boosts.doubleTap>Date.now()) {
      var autoBase = state.autoPerSec + (state.boosts.doubleTap>Date.now() ? 2 : 0);
      autoAccum += autoBase * dt / 60;
      if (autoAccum >= 0.01) {
        var pay = Math.floor(autoAccum * 100) / 100;
        state.coins = Math.round((state.coins + pay) * 100) / 100;
        state.totalEarned = Math.round((state.totalEarned + pay) * 100) / 100;
        autoAccum -= pay;
        updateUI(); save();
      }
    }
    checkDeaths(); checkDelivery(); checkDrying(); checkSalting(); checkCutting();
    uploadScore();
    if (Date.now()-lastPriceUpdate>=PRICE_INTERVAL) updatePrices();
    var te=document.getElementById('mkt-timer');
    if (te) te.textContent=Math.max(0,Math.ceil((lastPriceUpdate+PRICE_INTERVAL-Date.now())/1000))+'—Б';
  } catch(e) { console.error('tick error:', e); }
  setTimeout(tick,500);
}

// вФАвФА –Ч–∞–њ—Г—Б–Ї вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
load();
calcStats();
processOffline();
initFirebase();

// –Ч–∞–≥—А—Г–ґ–∞–µ–Љ –Є–Ј Firebase –Є —Б—А–∞–≤–љ–Є–≤–∞–µ–Љ —Б localStorage –њ–Њ lastSeen
function loadFromFirebase(callback) {
  if (!firebaseDB) { callback(); return; }
  var pid = getPlayerId();
  if (!pid || pid.startsWith('p_')) { callback(); return; } // —В–Њ–ї—М–Ї–Њ –і–ї—П Telegram –њ–Њ–ї—М–Ј–Њ–≤–∞—В–µ–ї–µ–є
  firebaseDB.ref('saves/' + pid).once('value', function(snap) {
    var fbData = snap.val();
    if (!fbData) { callback(); return; }
    var localRaw = localStorage.getItem(SAVE_KEY);
    var localData = localRaw ? JSON.parse(localRaw) : null;
    var fbTime = fbData.lastSeen || 0;
    var localTime = localData ? (localData.lastSeen || 0) : 0;
    if (fbTime > localTime) {
      // Firebase –љ–Њ–≤–µ–µ вАФ –њ—А–Є–Љ–µ–љ—П–µ–Љ –µ–≥–Њ –і–∞–љ–љ—Л–µ
      applyState(fbData);
      localStorage.setItem(SAVE_KEY, JSON.stringify(fbData));
      calcStats();
      processOffline();
      updateUI();
      showNotif('рЯФД –Я—А–Њ–≥—А–µ—Б—Б —Б–Є–љ—Е—А–Њ–љ–Є–Ј–Є—А–Њ–≤–∞–љ —Б –Њ–±–ї–∞–Ї–∞');
    }
    callback();
  }, function() { callback(); });
}

function applyState(s) {
  s = migrate(s);
  state.coins  = s.coins  || 0;
  state.caught = s.caught || 0;
  state.currentLoc        = s.loc   || 'pond';
  state.unlockedLocs      = s.ulocs || ['pond'];
  state.unlockedFish      = s.ufish || {pond:['–Ъ–∞—А–∞—Б—М']};
  state.caughtFish        = s.cfish || {};
  state.liveFish          = s.live  || [];
  state.transport         = s.transport || 'bike';
  state.delivery          = s.delivery  || null;
  state.delivery2         = s.delivery2 || null;
  state.unlockedTransports= s.utrans    || ['bike'];
  state.durability        = s.dur || {bike:100,moped:100,car:100,truck:100};
  state.dailyDay          = s.dailyDay  || 0;
  state.dailyLastClaim    = s.dailyLast || 0;
  state.lastSeen          = s.lastSeen  || Date.now();
  state.totalEarned       = s.totalEarned || 0;
  state.drying            = s.drying    || [];
  state.driedFish         = s.driedFish || [];
  state.boosts            = s.boosts    || {doubleTap:0,turboDry:false,luckyRod:0,turboSpeed:0};
  state.quests            = s.quests       || [];
  state.questsDate        = s.questsDate   || 0;
  state.questProgress     = s.questProgress|| {};
  state.salt              = s.salt         || 0;
  state.saltOrder         = s.saltOrder    || 0;
  state.salting           = s.salting      || [];
  if (!Array.isArray(state.salting)) state.salting = [];
  state.knife             = s.knife        || 0;
  state.knifeOrder        = s.knifeOrder   || 0;
  state.cutting           = s.cutting      || [];
  state.filets            = s.filets       || [];
  state.playerName        = s.playerName   || '';
  for (var i=0;i<UPGRADES.length;i++) { if(s.upg&&s.upg[UPGRADES[i].id]) UPGRADES[i].bought=s.upg[UPGRADES[i].id]; }
  for (var j=0;j<LOCATIONS.length;j++) { if(state.unlockedLocs.indexOf(LOCATIONS[j].id)>=0) LOCATIONS[j].unlocked=true; }
  if (s.prices)  marketPrices    = s.prices;
  if (s.priceTs) lastPriceUpdate = s.priceTs;
}

setTimeout(function() {
  loadFromFirebase(function() {
    checkPendingBoosts();
    checkNameInput();
    setTimeout(checkDailyNews, 1500);
  });
}, 800);

initPrices();
if (!lastPriceUpdate) { updatePrices(); lastPriceUpdate=Date.now(); }
calcStats();
var il=getLoc();
var oc=document.getElementById('ocean');
oc.style.background=il.bg; oc.style.borderBottomColor=il.border;
document.getElementById('loc-label').textContent=il.emoji+' '+il.name;
for (var bi=0;bi<LOCATIONS.length;bi++) if(state.unlockedLocs.indexOf(LOCATIONS[bi].id)>=0) LOCATIONS[bi].unlocked=true;
spawnBubbles(); renderLocBar(); updateUI(); setTimeout(tick,500);
</script>
